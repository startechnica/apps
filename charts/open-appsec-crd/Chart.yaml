description: CustomResourceDefinitions for open-appsec. Ship the CRDs as their own
  release so the sister `open-appsec-injector` chart can be installed and upgraded
  without re-applying CRDs (which Helm intentionally refuses to update inside
  `templates/`). Includes every `openappsec.io` resource the injector renders.
