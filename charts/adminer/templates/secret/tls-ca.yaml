{{/*
Persistent self-signed Certificate Authority shared by the chart's ingress and
gateway leaf TLS Secrets (see `templates/secret/ingress-tls.yaml` and
`templates/secret/gateway-tls.yaml`). Rendered only when at least one leaf
needs a self-signed cert — when both paths use cert-manager, the user-provided
secrets, or BYO `existingSecret`, this resource is skipped.

Holds `ca.crt` AND `ca.key` so subsequent `helm upgrade` runs can recover the
exact same CA via `lookup` (see `adminer.tls.ca.init` in `_helpers.tpl`) and
re-sign new leaf certs with it — keeping clients trusting the CA across
ingress↔gateway migrations and routine upgrades.
*/}}
{{- $ingressSelfSigned := and .Values.ingress.enabled .Values.ingress.tls .Values.ingress.selfSigned (not .Values.tls.certManager.create) -}}
{{- $gatewaySelfSigned := and .Values.gateway.enabled .Values.gateway.tls.enabled .Values.gateway.tls.selfSigned (not .Values.tls.certManager.create) (not .Values.gateway.tls.existingSecret) (not .Values.gateway.tls.secrets) -}}
{{- if or $ingressSelfSigned $gatewaySelfSigned }}
{{- include "adminer.tls.ca.init" . }}
{{- $ca := index $ "_adminerTlsCa" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adminer.tls.ca.secretName" . }}
  namespace: {{ include "st-common.names.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "st-common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc | quote }}
  ca.key: {{ $ca.Key | b64enc | quote }}
{{- end }}
