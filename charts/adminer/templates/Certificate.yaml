{{- if (include "st-common.capabilities.certmanagerCertificate.apiVersion" .) }}
{{- $apiVersion := include "st-common.capabilities.certmanagerCertificate.apiVersion" . -}}
{{- if and .Values.ingress.tls .Values.tls.certManager.create (not .Values.ingress.selfSigned) }}
apiVersion: {{ $apiVersion }}
kind: Certificate
metadata:
  name: {{ include "st-common.names.fullname" . }}
  namespace: {{ include "st-common.names.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "st-common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ printf "%s-tls" .Values.ingress.hostname }}
  issuerRef:
    group: {{ .Values.tls.certManager.issuerRef.group }}
    kind: {{ .Values.tls.certManager.issuerRef.kind }}
    name: {{ .Values.tls.certManager.issuerRef.name }}
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  subject:
    organizations:
      - {{ .Release.Name | quote }}
    organizationalUnits:
      - {{ include "st-common.names.fullname" . }}
  dnsNames:
    - {{ .Values.ingress.hostname | quote }}
    {{- range .Values.ingress.extraHosts }}
    - {{ .name | quote }}
    {{- end }}
{{- end }}
{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled .Values.tls.certManager.create }}
{{- if and .Values.ingress.tls .Values.tls.certManager.create (not .Values.ingress.selfSigned) }}
---
{{- end }}
{{- $primaryHost := default .Values.ingress.hostname (first .Values.gateway.hostnames) }}
{{- $altNames := default (list $primaryHost) .Values.gateway.hostnames }}
apiVersion: {{ $apiVersion }}
kind: Certificate
metadata:
  name: {{ include "st-common.names.fullname" . }}
  namespace: {{ include "st-common.gateway.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "st-common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ include "adminer.gateway.tlsSecretName" . }}
  issuerRef:
    group: {{ .Values.tls.certManager.issuerRef.group }}
    kind: {{ .Values.tls.certManager.issuerRef.kind }}
    name: {{ .Values.tls.certManager.issuerRef.name }}
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  subject:
    organizations:
      - {{ .Release.Name | quote }}
    organizationalUnits:
      - {{ include "st-common.names.fullname" . }}
  dnsNames:
    {{- range $altNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
{{- end }}
