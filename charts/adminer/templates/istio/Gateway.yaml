{{- if and .Values.gateway.enabled (eq .Values.gateway.implementation "istio") (not .Values.gateway.existingGateway) }}
{{- if (include "st-common.capabilities.istioGateway.apiVersion" .) }}
apiVersion: {{ include "st-common.capabilities.istioGateway.apiVersion" . }}
kind: Gateway
metadata:
  name: {{ include "st-common.gateway.fullname" . }}
  namespace: {{ include "st-common.names.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "st-common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  selector:
    istio.io/gateway-name: {{ default "ingressgateway" .Values.gateway.gateway.name }}
  servers:
    - port:
        name: http
        number: 80
        protocol: HTTP
      hosts:
        {{- if .Values.gateway.hostnames }}
        {{- range .Values.gateway.hostnames }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        - "*"
        {{- end }}
    {{- if .Values.gateway.tls.enabled }}
    - port:
        name: https
        number: {{ .Values.service.ports.https | int }}
        protocol: HTTPS
      hosts:
        {{- if .Values.gateway.hostnames }}
        {{- range .Values.gateway.hostnames }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        - "*"
        {{- end }}
      tls:
        credentialName: {{ include "adminer.gateway.tlsSecretName" . }}
        mode: SIMPLE
    {{- end }}
{{- end }}
{{- end }}
