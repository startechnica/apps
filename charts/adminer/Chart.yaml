annotations:
  category: DatabaseManagement
  artifacthub.io/images: |
    - name: adminer
      image: docker.io/adminer:5.4.2-standalone
  artifacthub.io/changes: |
    - kind: added
      description: "values.schema.json for runtime validation of values overrides."
    - kind: added
      description: "Artifact Hub / Version / Type / AppVersion shields in README."
    - kind: fixed
      description: "Duplicate metrics.serviceMonitor.endpoints key in values.yaml (silent last-wins override)."
apiVersion: v2
appVersion: 5.4.2
dependencies:
  - name: st-common
    repository: https://startechnica.github.io/apps
    version: 0.1.20
    alias: startechnica-common
description: Adminer is a full-featured database management tool written in PHP. Conversely
  to phpMyAdmin, it consist of a single file ready to deploy to the target server. Adminer
  is available for MySQL, MariaDB, PostgreSQL, SQLite, MS SQL, Oracle, Firebird, SimpleDB,
  Elasticsearch and MongoDB
home: https://github.com/startechnica/apps/tree/main/charts/adminer
icon: https://raw.githubusercontent.com/vrana/adminer/master/adminer/static/logo.png
keywords:
  - adminer
  - postgres
  - mysql
  - sqlite
  - elasticsearch
  - mongodb
  - database
  - sql
maintainers:
  - name: firmansyahn
    email: firmansyah@nainggolan.id
    url: https://firmansyah.nainggolan.id
name: adminer
sources:
  - https://www.adminer.org
  - https://github.com/startechnica/apps.git
type: application
version: 1.0.1
