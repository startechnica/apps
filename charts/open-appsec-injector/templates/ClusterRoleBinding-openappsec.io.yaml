apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s:openappsec.io" (include "st-common.names.fullname" .) }}
  labels: {{- include "st-common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: open-appsec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s:openappsec.io" (include "st-common.names.fullname" .) }}
subjects:
  {{- $allowed := .Values.allowedNamespaces | default (list) }}
  {{- if has "*" $allowed }}
  - kind: Group
    name: system:serviceaccounts
    apiGroup: rbac.authorization.k8s.io
  {{- else if empty $allowed }}
  - kind: Group
    name: {{ printf "system:serviceaccounts:%s" (include "st-common.names.namespace" .) }}
    apiGroup: rbac.authorization.k8s.io
  {{- else }}
  {{- range $allowed }}
  - kind: Group
    name: {{ printf "system:serviceaccounts:%s" . }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- end }}
