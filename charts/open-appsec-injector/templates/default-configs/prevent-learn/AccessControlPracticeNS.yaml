##ref: https://raw.githubusercontent.com/openappsec/openappsec/main/config/k8s/v1beta2/open-appsec-k8s-default-config-v1beta2.yaml

{{- if and .Values.defaultConfigurations.enabled (eq .Values.defaultConfigurations.mode "prevent-learn") (eq .Values.crds.scope "namespaced") }}
apiVersion: openappsec.io/v1beta2
kind: AccessControlPracticeNS
metadata:
  name: default-access-control-practice
  namespace: {{ include "st-common.names.namespace" . | quote }}
spec:
  practiceMode: inherited
  rateLimit:
    overrideMode: inherited
    rules: []
{{- end }}
