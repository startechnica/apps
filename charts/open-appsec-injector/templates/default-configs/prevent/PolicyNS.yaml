##ref: https://raw.githubusercontent.com/openappsec/openappsec/main/config/k8s/v1beta2/open-appsec-k8s-default-config-v1beta2.yaml

{{- if and .Values.defaultConfigurations.enabled (eq .Values.defaultConfigurations.mode "prevent") (eq .Values.crds.scope "namespaced") }}
apiVersion: openappsec.io/v1beta2
kind: PolicyNS
metadata:
  name: default-policy
  namespace: {{ include "st-common.names.namespace" . | quote }}
spec:
  default:
    # active prevention with learning disabled — block known-bad traffic
    # against a frozen model. Use after `prevent-learn` has stabilized.
    mode: prevent
    threatPreventionPractices:
    - default-threat-prevention-practice
    accessControlPractices:
    - default-access-control-practice
    customResponse: default-web-user-response
    triggers:
    - default-log-trigger
{{- end }}
