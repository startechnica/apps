{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
{{- if not (eq (include "st-common.capabilities.coreosMonitoring.apiVersion" .) "false") }}
apiVersion: {{ include "st-common.capabilities.coreosMonitoring.apiVersion" . }}
kind: ServiceMonitor
metadata:
  name: {{ include "st-common.names.fullname" . }}
  namespace: {{ default (include "st-common.names.namespace" .) .Values.metrics.serviceMonitor.namespace | quote }}
  {{- $labels := include "st-common.tplvalues.merge" (dict "values" (list .Values.webhook.metrics.serviceMonitor.labels .Values.commonLabels) "context" .) }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" $labels "context" $) | nindent 4 }}
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: open-appsec
   {{- if or .Values.commonAnnotations .Values.webhook.metrics.serviceMonitor.annotations }}
   {{- $annotations := merge .Values.webhook.metrics.serviceMonitor.annotations .Values.commonAnnotations }}
  annotations: {{- include "st-common.tplvalues.render" (dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webhook.metrics.serviceMonitor.jobLabel }}
  jobLabel: {{ .Values.webhook.metrics.serviceMonitor.jobLabel }}
  {{- end }}
  endpoints:
    {{- $defaultEndpoint := pick .Values.webhook.metrics.serviceMonitor "port" "interval" "scrapeTimeout" "relabelings" "metricRelabelings" "honorLabels" "tlsConfig" }}
    {{- $endpoints := ternary (.Values.webhook.metrics.serviceMonitor.endpoints) (list (dict "path" .Values.webhook.metrics.serviceMonitor.path)) (not (empty .Values.webhook.metrics.serviceMonitor.endpoints)) }}
    {{- range $endpoints }}
    {{- $endpoint := merge . $defaultEndpoint }}
    - port: {{ $endpoint.port | quote }}
      path: {{ include "st-common.tplvalues.render" ( dict "value" $endpoint.path "context" $) }}
      {{- if $endpoint.tlsConfig }}
      scheme: https
      tlsConfig: {{- include "st-common.tplvalues.render" (dict "value" $endpoint.tlsConfig "context" $) | nindent 8 }}
      {{- end }}
      {{- if $endpoint.interval }}
      interval: {{ $endpoint.interval }}
      {{- end }}
      {{- if $endpoint.scrapeTimeout }}
      scrapeTimeout: {{ $endpoint.scrapeTimeout }}
      {{- end }}
      {{- if $endpoint.relabelings }}
      relabelings: {{- include "st-common.tplvalues.render" (dict "value" $endpoint.relabelings "context" $) | nindent 6 }}
      {{- end }}
      {{- if $endpoint.metricRelabelings }}
      metricRelabelings: {{- include "st-common.tplvalues.render" (dict "value" $endpoint.metricRelabelings "context" $) | nindent 6 }}
      {{- end }}
      {{- if $endpoint.honorLabels }}
      honorLabels: {{ $endpoint.honorLabels }}
      {{- end }}
    {{- end }}
  namespaceSelector:
    matchNames:
      - {{ include "st-common.names.namespace" . | quote }}
  selector:
    matchLabels: {{- include "st-common.labels.matchLabels" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 6 }}
      {{- if .Values.webhook.metrics.serviceMonitor.selector }}
      {{- include "st-common.tplvalues.render" (dict "value" .Values.webhook.metrics.serviceMonitor.selector "context" $) | nindent 6 }}
      {{- end }}
      app.kubernetes.io/component: webhook
      app.kubernetes.io/part-of: open-appsec
{{- end }}
{{- end -}}
