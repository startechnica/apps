{{- if and .Values.webhook.tls.autoGenerated .Values.tls.certManager.create (not .Values.tls.certManager.issuerRef.name) }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ printf "%s-webhook-selfsigned" (include "st-common.names.fullname" .) }}
  namespace: {{ include "st-common.names.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: open-appsec
spec:
  selfSigned: {}
{{- end }}
