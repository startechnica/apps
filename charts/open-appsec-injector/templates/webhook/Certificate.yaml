{{- if and .Values.webhook.tls.autoGenerated .Values.tls.certManager.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-webhook" (include "st-common.names.fullname" .) }}
  namespace: {{ include "st-common.names.namespace" . | quote }}
  labels: {{- include "st-common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: open-appsec
spec:
  secretName: {{ include "open-appsec.webhook.tlsSecretName" . }}
  duration: {{ .Values.tls.certManager.duration }}
  renewBefore: {{ .Values.tls.certManager.renewBefore }}
  usages:
    - server auth
    - digital signature
    - key encipherment
    - content commitment
  dnsNames:
    - {{ printf "%s" (include "open-appsec.webhook.serviceName" .) }}
    - {{ printf "%s.%s" (include "open-appsec.webhook.serviceName" .) (include "st-common.names.namespace" .) }}
    - {{ printf "%s.%s.svc" (include "open-appsec.webhook.serviceName" .) (include "st-common.names.namespace" .) }}
    - {{ printf "%s.%s.svc.%s" (include "open-appsec.webhook.serviceName" .) (include "st-common.names.namespace" .) (default "cluster.local" .Values.clusterDomain) }}
  issuerRef:
    {{- if .Values.tls.certManager.issuerRef.name }}
    group: {{ .Values.tls.certManager.issuerRef.group }}
    kind: {{ .Values.tls.certManager.issuerRef.kind }}
    name: {{ .Values.tls.certManager.issuerRef.name }}
    {{- else }}
    group: cert-manager.io
    kind: Issuer
    name: {{ printf "%s-webhook-selfsigned" (include "st-common.names.fullname" .) }}
    {{- end }}
{{- end }}
