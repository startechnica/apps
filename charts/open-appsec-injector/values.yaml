    sessionAffinityConfig: {}

  ## @section Webhook TLS configuration
  ## @param webhook.tls.enabled  Enable SSL/TLS encryption for server (HTTPS)
  ## @param webhook.tls.autoGenerated  Create self-signed TLS certificates. Currently only supports PEM certificates.
  ## @param webhook.tls.certificatesMountPath  Where certifcates are mounted.
  ## @param webhook.tls.certificatesSecretName  Name of the secret that contains the certificates
  ## @param webhook.tls.certCAFilename  CA certificate filename. Should match with the CA entry key in the tls.certificatesSecretName.
  ## @param webhook.tls.certFilename  Client certificate filename to authenticate against the server. Should match with certificate the entry key in the tls.certificatesSecretName.
  ## @param webhook.tls.certKeyFilename  Client Key filename to authenticate against the server. Should match with certificate the entry key in the tls.certificatesSecretName.
  ## @param webhook.tls.existingSecretName  Name of the existing secret containing  server certificates
  ##
  ##
  tls:
    enabled: false
    autoGenerated: false
    certificatesMountPath: /certs/
    certificatesSecretName: ""
    certFilename: server.crt
    certKeyFilename: server.key
    certCAFilename: ca.crt
    ## @param webhook.tls.certSecretKey Data key inside the TLS Secret holding the leaf certificate. Defaults to the `kubernetes.io/tls` standard (`tls.crt`) that cert-manager and most external-secrets operators emit. Override if your BYO Secret uses a different key name.
    ##
    certSecretKey: tls.crt
    ## @param webhook.tls.certKeySecretKey Data key inside the TLS Secret holding the private key. Defaults to `tls.key` (the `kubernetes.io/tls` standard).
    ##
    certKeySecretKey: tls.key
    ## @param webhook.tls.caSecretKey Data key inside the TLS Secret holding the CA bundle. Defaults to `ca.crt`.
    ##
    caSecretKey: ca.crt
    existingSecretName: ""
    ## @param webhook.tls.usePemCerts Use this variable if your secrets contain PEM certificates instead of PKCS12
    ## Note: Ignored when using autoGenerated certs.
    ##
    usePemCerts: false
    ## @param webhook.tls.keyPassword Password to access the PEM key when it is password-protected.
    ##
    keyPassword: ""
    ## @param webhook.tls.keystorePassword Password to access the PKCS12 keystore when it is password-protected.
    ##
    keystorePassword: ""
    ## @param webhook.tls.passwordsSecret Name of a existing secret containing the Keystore or PEM key password
    ##
    passwordsSecret: ""

  ## Network Policies
  ## ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
  ##
  networkPolicy:
    ## @param webhook.networkPolicy.enabled Render a NetworkPolicy for the webhook Pod
    ##
    enabled: false
    ## @param webhook.networkPolicy.allowExternal When `false`, only Pods labeled `<fullname>-webhook-client: "true"` may connect on the webhook port. The K8s API server (admission caller) is NOT a Pod, so leave this `true` unless you've installed an apiserver-network-proxy that fronts admission calls.
    ##
    allowExternal: true
    ## @param webhook.networkPolicy.allowExternalEgress Allow egress to any destination. When `false`, egress is restricted to DNS + the K8s API server (the container patches the MutatingWebhookConfiguration's `caBundle` via `secretgen.py` at startup).
    ##
    allowExternalEgress: true
    ## @param webhook.networkPolicy.extraIngress [array] Extra ingress rules appended verbatim to the NetworkPolicy
    ##
    extraIngress: []
    ## @param webhook.networkPolicy.extraEgress [array] Extra egress rules appended verbatim to the NetworkPolicy
    ##
    extraEgress: []
    ## @param webhook.networkPolicy.ingressNSMatchLabels [object] Namespace label selector used to widen ingress to specific namespaces
    ## @param webhook.networkPolicy.ingressNSPodMatchLabels [object] Pod label selector applied inside namespaces matched by `ingressNSMatchLabels`
    ##
    ingressNSMatchLabels: {}
    ingressNSPodMatchLabels: {}
    ## Metrics-scrape ingress (rendered only when `metrics.enabled=true`).
    ##
    metrics:
      ## @param webhook.networkPolicy.metrics.allowExternal When `false`, restrict Prometheus metrics scraping to namespaces matched by the metrics selectors below.
      ##
      allowExternal: true
      ## @param webhook.networkPolicy.metrics.ingressNSMatchLabels [object] Namespace label selector for Prometheus scrape ingress
      ## @param webhook.networkPolicy.metrics.ingressNSPodMatchLabels [object] Pod label selector for Prometheus scrape ingress
      ##
      ingressNSMatchLabels: {}
      ingressNSPodMatchLabels: {}

  ## ServiceAccount configuration for the open-appsec Webhook
  ##
  serviceAccount:
    ## @param webhook.serviceAccount.create Specifies whether a ServiceAccount should be created
    ##
    create: true
    ## @param webhook.serviceAccount.name The name of the ServiceAccount to use.
    ## If not set and create is true, a name is generated using the common.names.fullname template
