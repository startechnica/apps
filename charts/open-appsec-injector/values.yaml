## @param allowedNamespaces [array] Namespaces this chart's RBAC + NetworkPolicies are scoped to. Drives both the `openappsec.io` ClusterRoleBinding subject set AND the ingress source set on every component's NetworkPolicy (when networkPolicy.enabled=true).
##   - []         — release namespace only (most restrictive; safe default)
##   - ["*"]      — every namespace, cluster-wide (legacy / open-appsec upstream default; needed for cross-namespace agent sidecars)
##   - [foo, bar] — explicit namespaces (per-namespace RBAC + per-namespace ingress)
## Background: the open-appsec agent is injected as a sidecar into target pods using whatever SA the host pod runs under. To read CRs at runtime the sidecar's SA needs `get/list/watch` on `openappsec.io/*`, and its egress must reach the learning/storage/tuning Services in the release namespace. The same namespace set governs both axes — set it once.
##
allowedNamespaces: []


## @section External database (shared)

## Connection details for an external PostgreSQL instance shared across any
## component that needs one (currently `appsec.tuning`; future components like
## learning could reuse the same connection).
##
## The logical-database NAME is NOT chart-configurable. Upstream
## `smartsync-tuning` hardcodes `i2datatubeschemasecurityeventlogsv03` in
## the connection-URL format string (`datatube.go`); a chart-side override
## would have no effect without an upstream patch. An external server must
## either already host that database or allow the binary to create it.
##
## Setting `externalDatabase.host` flips every component that supports DB
## access over to the external endpoint via the `open-appsec.tuning.db*`
## helpers. The bundled `postgresql` subchart is governed separately by
## `postgresql.enabled` — use exactly one of (external host set) or
## (postgresql.enabled=true).
##
externalDatabase:
  ## @param externalDatabase.host Hostname or Service of an external PostgreSQL. Empty falls back to the bundled `postgresql` subchart's primary Service (which requires `postgresql.enabled=true`).
  ##
  host: ""
  ## @param externalDatabase.port TCP port of the external PostgreSQL.
  ##
  port: 5432
  ## @param externalDatabase.user PostgreSQL username (informational; currently consumers read only the password and connect as the admin user).
  ##
  user: ""
  ## @param externalDatabase.existingSecret Name of an existing Secret holding the PostgreSQL password. Empty falls back to the bundled subchart's auto-generated Secret.
  ##
  existingSecret: ""
  ## @param externalDatabase.existingSecretPasswordKey Data key inside `existingSecret` holding the password. Empty falls back to `postgresql.adminPasswordKey` from the subchart (typically `postgres-password`).
  ##
  existingSecretPasswordKey: ""


