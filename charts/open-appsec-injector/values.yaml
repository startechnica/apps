  ## @param webhook.nodeSelector [object] Node labels for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  nodeSelector: {}
  ## @param webhook.tolerations [array] Tolerations for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  tolerations: []
  ## @param webhook.topologySpreadConstraints [array] Topology spread constraints rely on node labels to identify the topology domain(s) that each Node is in
  ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
  ##
  ## topologySpreadConstraints:
  ##   - maxSkew: 1
  ##     topologyKey: failure-domain.beta.kubernetes.io/zone
  ##     whenUnsatisfiable: DoNotSchedule
  ##
  topologySpreadConstraints: []
  ## @param webhook.podSecurityContext.enabled Enable securityContext on for open-appsec webhook deployment
  ## @param webhook.podSecurityContext.sysctls [array] Set kernel settings using the sysctl interface
  ## @param webhook.podSecurityContext.seccompProfile [object] Set pod's Security Context seccomp profile
  ## @param webhook.podSecurityContext.supplementalGroups [array] Set filesystem extra groups
  ##
  podSecurityContext:
    enabled: false
    # fsGroup: 1001
    # fsGroupChangePolicy: Always
    # runAsNonRoot: true
    sysctls: []
    supplementalGroups: []
    seccompProfile:
      type: RuntimeDefault
  ## Configure Container Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ## @param webhook.containerSecurityContext.enabled Enabled containers' Security Context
  ## @param webhook.containerSecurityContext.seLinuxOptions [object,nullable] Set SELinux options in container
  ## @param webhook.containerSecurityContext.privileged Set container's Security Context privileged
  ## @param webhook.containerSecurityContext.readOnlyRootFilesystem Set container's Security Context readOnlyRootFilesystem
  ## @param webhook.containerSecurityContext.allowPrivilegeEscalation Set container's Security Context allowPrivilegeEscalation
  ## @param webhook.containerSecurityContext.capabilities.drop List of capabilities to be dropped
  ## @param webhook.containerSecurityContext.seccompProfile.type Set container's Security Context seccomp profile
  ##
  containerSecurityContext:
    enabled: false
    seLinuxOptions: {}
    # runAsUser: 1001
    # runAsGroup: 1001
    # runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: "RuntimeDefault"
  ## open-appsec webhook containers' resource requests and limits
  ## ref: https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  ## @param webhook.resourcesPreset Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, 
  ## large, xlarge, 2xlarge). This is ignored if resources is set (resources is recommended for production).
  ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
  ##
  resourcesPreset: "gs-3xsmall"
  ## Example:
  ## resources:
  ##   requests:
  ##     cpu: 2
  ##     memory: 512Mi
  ##   limits:
  ##     cpu: 3
  ##     memory: 1024Mi
  ##
  resources:
    requests:
      ## @param webhook.resources.requests.cpu Request cpu for the container
      cpu: 100m
      ## @param webhook.resources.requests.memory Request memory for the container
      memory: 128Mi
  ## open-appsec webhook containers' liveness probe
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  ## @param webhook.livenessProbe.enabled Enable livenessProbe
  ## @param webhook.livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
  ## @param webhook.livenessProbe.periodSeconds Period seconds for livenessProbe
  ## @param webhook.livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
  ## @param webhook.livenessProbe.failureThreshold Failure threshold for livenessProbe
  ## @param webhook.livenessProbe.successThreshold Success threshold for livenessProbe
  ##
  livenessProbe:
    enabled: false
    httpGet:
      ## @param webhook.livenessProbe.httpGet.path HTTP path for liveness probe
      path: /ping
      ## @param webhook.livenessProbe.httpGet.port HTTP port for liveness probe
      port: https
      ## @param webhook.livenessProbe.httpGet.scheme HTTP scheme for liveness probe
      scheme: HTTPS
    failureThreshold: 6
    initialDelaySeconds: 120
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  ## open-appsec webhook containers' readinessProbe probe
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  ## @param webhook.readinessProbe.enabled Enable readinessProbe
  ## @param webhook.readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
  ## @param webhook.readinessProbe.periodSeconds Period seconds for readinessProbe
  ## @param webhook.readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
  ## @param webhook.readinessProbe.failureThreshold Failure threshold for readinessProbe
  ## @param webhook.readinessProbe.successThreshold Success threshold for readinessProbe
  ##
  readinessProbe:
    enabled: false
    httpGet:
      ## @param webhook.readinessProbe.httpGet.path HTTP path for readiness probe
      path: /ping
      ## @param webhook.readinessProbe.httpGet.port HTTP port for readiness probe
      port: https
      ## @param webhook.readinessProbe.httpGet.scheme HTTP scheme for readiness probe
      scheme: HTTPS
    failureThreshold: 6
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  ## @param webhook.startupProbe.enabled Enable startupProbe
  ## @param webhook.startupProbe.httpGet.path Path for readinessProbe
  ## @param webhook.startupProbe.httpGet.scheme Scheme for readinessProbe
  ## @param webhook.startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
  ## @param webhook.startupProbe.periodSeconds Period seconds for startupProbe
  ## @param webhook.startupProbe.timeoutSeconds Timeout seconds for startupProbe
  ## @param webhook.startupProbe.failureThreshold Failure threshold for startupProbe
  ## @param webhook.startupProbe.successThreshold Success threshold for startupProbe
  ##
  startupProbe:
    enabled: false
    httpGet:
      path: /ping
      ## @param webhook.startupProbe.httpGet.port HTTP port for startup probe
      port: https
      scheme: HTTPS
    failureThreshold: 6
    initialDelaySeconds: 30
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  ## @param webhook.customLivenessProbe [object] Custom livenessProbe that overrides the default one
  ##
  customLivenessProbe: {}
  ## @param webhook.customReadinessProbe [object] Custom readinessProbe that overrides the default one
  ##
  customReadinessProbe: {}
  ## @param webhook.customStartupProbe [object] Custom startupProbe that overrides the default one
  ##
  customStartupProbe: {}
  ## @param webhook.lifecycleHooks [object] for the open-appsec webhook container(s) to automate configuration before or after startup
  ##
  lifecycleHooks: {}
  ## @param webhook.sidecars [array] Attach additional sidecar containers to the open-appsec webhook pod
  ## Example:
