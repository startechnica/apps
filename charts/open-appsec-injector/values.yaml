## @section AppSec — Learning component

  learning:
    ## @param appsec.learning.enabled Enable learning
    enabled: true
    ## @param appsec.learning.nameOverride String to partially override app.fullname template (will maintain the release name)
    ##
    nameOverride: ""
    ## @param appsec.learning.fullnameOverride String to fully override app.fullname template
    ##
    fullnameOverride: ""
    ## @param appsec.learning.dnsPolicy DNS Policy for pod
    ## ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/
    ## E.g.
    ## dnsPolicy: ClusterFirst
    ##
    dnsPolicy: ""
    ## @param appsec.learning.dnsConfig [object] DNS Configuration pod
    ## ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/
    ## E.g.
    ## dnsConfig:
    ##   options:
    ##   - name: ndots
    ##     value: "4"
    ##
    dnsConfig: {}
    ## @param appsec.learning.hostUsers controls whether the container is allowed to share user namespaces
    ## with the host. When enabled, the pod may run with host-level user mappings,
    ## which can grant elevated privileges. This should remain disabled unless the
    ## workload explicitly requires host user access for system-level operations.
    ##
    hostUsers: false

    ## open-appsec Learning image version
    ## ref: 
    ## @param appsec.learning.image.registry [default: REGISTRY_NAME] open-appsec Learning image registry
    ## @param appsec.learning.image.repository [default: REPOSITORY_NAME/open-appsec Learning] open-appsec Learning image repository
    ## @skip learning.image.tag open-appsec Learning image tag (immutable tags are recommended)
    ## @param appsec.learning.image.digest open-appsec Learning image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
    ## @param appsec.learning.image.pullPolicy open-appsec Learning image pull policy
    ## @param appsec.learning.image.pullSecrets [array] open-appsec Learning image pull secrets
    ##
    image:
      registry: ghcr.io
      repository: openappsec/smartsync
      ## @param appsec.learning.image.tag Image tag (immutable tags are recommended)
      tag: latest
      digest: ""
      ## @param appsec.learning.image.debug Enable container image debug mode
      debug: false
      ## Specify a imagePullPolicy
      ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
      ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
      ##
      pullPolicy: Always
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ##
      ## pullSecrets:
      ##   - myRegistryKeySecretName
      pullSecrets: []

    ## @param appsec.learning.replicaCount Number of open-appsec appsec.learning nodes
    ##
    replicaCount: 1
    ## @param appsec.learning.revisionHistoryLimit  
    ##
    revisionHistoryLimit: 1
    ## @param appsec.learning.updateStrategy.type Set up update strategy for open-appsec appsec.learning installation.
    ## Set to Recreate if you use persistent volume that cannot be mounted by more than one pods to make sure the pods is destroyed first.
    ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
    ## Example:
    ## updateStrategy:
    ##  type: RollingUpdate
    ##  rollingUpdate:
    ##    maxSurge: 25%
    ##    maxUnavailable: 25%
    ##
    updateStrategy:
      type: RollingUpdate
    ## @param appsec.learning.automountServiceAccountToken Mount Service Account token in pod
    ##
    automountServiceAccountToken: false
    ## @param appsec.learning.hostAliases [array] Add deployment host aliases
    ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
    ##
    hostAliases: []
    ## @param appsec.learning.schedulerName Alternative scheduler
    ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
    ##
    schedulerName: ""
    ## @param appsec.learning.terminationGracePeriodSeconds In seconds, time the given to the open-appsec appsec.learning pod needs to terminate gracefully
    ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods
    ##
    terminationGracePeriodSeconds: ""
    ## @param appsec.learning.priorityClassName Priority class name
    ## ref: https://kubernetes.io/docs/concepts/configuration/pod-priority-preemption/
    ##
    priorityClassName: ""
    ## @param appsec.learning.deploymentAnnotations [object] Annotations to add to the deployment
    ##
    deploymentAnnotations: {}
    ## @param appsec.learning.podLabels [object] Extra labels for open-appsec appsec.learning pods
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
    ##
    podLabels: {}
    ## @param appsec.learning.podAnnotations [object] open-appsec appsec.learning Pod annotations
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
    ##
    podAnnotations: {}
    ## @param appsec.learning.podAffinityPreset Pod affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
    ##
    podAffinityPreset: ""
    ## @param appsec.learning.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
    ##
    podAntiAffinityPreset: soft
    ## @param appsec.learning.containerName  Name of the container
    ##
    containerName: learning
    ## @param appsec.learning.containerPorts.http Container HTTP port
    ##
    containerPorts:
      http: 80
    ## @param appsec.learning.extraPorts [array] Extra ports for container deployment
    ##
    extraPorts: []
    ## Node affinity preset
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
    ## @param appsec.learning.nodeAffinityPreset.type Node affinity preset type. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## @param appsec.learning.nodeAffinityPreset.key Node label key to match Ignored if `affinity` is set.
    ## @param appsec.learning.nodeAffinityPreset.values [array] Node label values to match. Ignored if `affinity` is set.
    ##
    nodeAffinityPreset:
      type: ""
      ## E.g.
      ## key: "kubernetes.io/e2e-az-name"
      ##
      key: ""
      ## E.g.
      ## values:
      ##   - e2e-az1
      ##   - e2e-az2
      ##
      values: []
    ## @param appsec.learning.affinity [object] Affinity for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
    ## Note: podAffinityPreset, podAntiAffinityPreset, and  nodeAffinityPreset will be ignored when it's set
    ##
    affinity: {}
    ## @param appsec.learning.nodeSelector [object] Node labels for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
    ##
    nodeSelector: {}
    ## @param appsec.learning.tolerations [array] Tolerations for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
    ##
    tolerations: []
    ## @param appsec.learning.topologySpreadConstraints [array] Topology spread constraints rely on node labels to identify the topology domain(s) that each Node is in
    ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
    ##
    ## topologySpreadConstraints:
    ##   - maxSkew: 1
    ##     topologyKey: failure-domain.beta.kubernetes.io/zone
    ##     whenUnsatisfiable: DoNotSchedule
    ##
    topologySpreadConstraints: []
    ## @param appsec.learning.podSecurityContext.enabled Enable securityContext on for open-appsec appsec.learning deployment
    ## @param appsec.learning.podSecurityContext.fsGroup Group to configure permissions for volumes
    ## @param appsec.learning.podSecurityContext.fsGroupChangePolicy Set filesystem group change policy
    ## @param appsec.learning.podSecurityContext.runAsNonRoot Set pod's Security Context runAsNonRoot
    ## @param appsec.learning.podSecurityContext.sysctls [array] Set kernel settings using the sysctl interface
    ## @param appsec.learning.podSecurityContext.seccompProfile [object] Set pod's Security Context seccomp profile
    ## @param appsec.learning.podSecurityContext.supplementalGroups [array] Set filesystem extra groups
    ##
    podSecurityContext:
      enabled: true
      fsGroup: 1000
      fsGroupChangePolicy: Always
      runAsNonRoot: true
      sysctls: []
      supplementalGroups: []
      seccompProfile:
        type: RuntimeDefault
    ## Configure Container Security Context
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
    ## @param appsec.learning.containerSecurityContext.enabled Enabled containers' Security Context
    ## @param appsec.learning.containerSecurityContext.seLinuxOptions [object,nullable] Set SELinux options in container
    ## @param appsec.learning.containerSecurityContext.runAsUser Set containers' Security Context runAsUser
    ## @param appsec.learning.containerSecurityContext.runAsGroup Set containers' Security Context runAsGroup
    ## @param appsec.learning.containerSecurityContext.runAsNonRoot Set container's Security Context runAsNonRoot
    ## @param appsec.learning.containerSecurityContext.privileged Set container's Security Context privileged
    ## @param appsec.learning.containerSecurityContext.readOnlyRootFilesystem Set container's Security Context readOnlyRootFilesystem
    ## @param appsec.learning.containerSecurityContext.allowPrivilegeEscalation Set container's Security Context allowPrivilegeEscalation
    ## @param appsec.learning.containerSecurityContext.seccompProfile.type Set container's Security Context seccomp profile
    ##
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      # capabilities:
      #   drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    ## open-appsec appsec.learning containers' resource requests and limits
    ## ref: https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
    ## We usually recommend not to specify default resources and to leave this as a conscious
    ## choice for the user. This also increases chances charts run on environments with little
    ## resources, such as Minikube. If you do want to specify resources, uncomment the following
    ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    ## @param appsec.learning.resourcesPreset Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, 
    ## large, xlarge, 2xlarge). This is ignored if resources is set (resources is recommended for production).
    ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    ##
    resourcesPreset: "gs-3xsmall"
    ## @param appsec.learning.resources [object] Set container requests and limits for different resources like CPU or memory (essential for production workloads)
    ## Example:
    ## resources:
    ##   requests:
    ##     cpu: 2
    ##     memory: 512Mi
    ##   limits:
    ##     cpu: 3
    ##     memory: 1024Mi
    ##
    resources: {}
    ## open-appsec appsec.learning containers' liveness probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.learning.livenessProbe.enabled Enable livenessProbe
    ## @param appsec.learning.livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
    ## @param appsec.learning.livenessProbe.periodSeconds Period seconds for livenessProbe
    ## @param appsec.learning.livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
    ## @param appsec.learning.livenessProbe.failureThreshold Failure threshold for livenessProbe
    ## @param appsec.learning.livenessProbe.successThreshold Success threshold for livenessProbe
    ##
    livenessProbe:
      enabled: true
      httpGet:
        ## @param appsec.learning.livenessProbe.httpGet.path HTTP path for liveness probe
        path: /health/live
        ## @param appsec.learning.livenessProbe.httpGet.port HTTP port for liveness probe
        port: http
        ## @param appsec.learning.livenessProbe.httpGet.scheme HTTP scheme for liveness probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 20
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 10
    ## open-appsec appsec.learning containers' readinessProbe probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.learning.readinessProbe.enabled Enable readinessProbe
    ## @param appsec.learning.readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
    ## @param appsec.learning.readinessProbe.periodSeconds Period seconds for readinessProbe
    ## @param appsec.learning.readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
    ## @param appsec.learning.readinessProbe.failureThreshold Failure threshold for readinessProbe
    ## @param appsec.learning.readinessProbe.successThreshold Success threshold for readinessProbe
    ##
    readinessProbe:
      enabled: true
      httpGet:
        ## @param appsec.learning.readinessProbe.httpGet.path HTTP path for readiness probe
        path: /health/ready
        ## @param appsec.learning.readinessProbe.httpGet.port HTTP port for readiness probe
        port: http
        ## @param appsec.learning.readinessProbe.httpGet.scheme HTTP scheme for readiness probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 3
      periodSeconds: 15
      successThreshold: 1
      timeoutSeconds: 10
    ## @param appsec.learning.startupProbe.enabled Enable startupProbe
    ## @param appsec.learning.startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
    ## @param appsec.learning.startupProbe.periodSeconds Period seconds for startupProbe
    ## @param appsec.learning.startupProbe.timeoutSeconds Timeout seconds for startupProbe
    ## @param appsec.learning.startupProbe.failureThreshold Failure threshold for startupProbe
    ## @param appsec.learning.startupProbe.successThreshold Success threshold for startupProbe
    ##
    startupProbe:
      enabled: false
      httpGet:
        ## @param appsec.learning.startupProbe.httpGet.path HTTP path for startup probe
        path: ""
        ## @param appsec.learning.startupProbe.httpGet.port HTTP port for startup probe
        port: http
        ## @param appsec.learning.startupProbe.httpGet.scheme HTTP scheme for startup probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 30
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5
    ## @param appsec.learning.customLivenessProbe [object] Custom livenessProbe that overrides the default one
    ##
    customLivenessProbe: {}
    ## @param appsec.learning.customReadinessProbe [object] Custom readinessProbe that overrides the default one
    ##
    customReadinessProbe: {}
    ## @param appsec.learning.customStartupProbe [object] Custom startupProbe that overrides the default one
    ##
    customStartupProbe: {}
    ## @param appsec.learning.lifecycleHooks [object] for the open-appsec appsec.learning container(s) to automate configuration before or after startup
    ##
    lifecycleHooks: {}
    ## @param appsec.learning.sidecars [array] Attach additional sidecar containers to the open-appsec appsec.learning pod
    ## Example:
    ## sidecars:
    ##   - name: your-image-name
    ##     image: your-image
    ##     imagePullPolicy: Always
    ##     ports:
    ##       - name: portname
    ##         containerPort: 1234
    ##
    sidecars: []
    ## @param appsec.learning.initContainers [array] Add additional init containers to the open-appsec appsec.learning pod(s)
    ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
    ## e.g:
    ## initContainers:
    ##  - name: your-image-name
    ##    image: your-image
    ##    imagePullPolicy: Always
    ##    command: ['sh', '-c', 'echo "hello world"']
    ##
    initContainers: []
    ## @param appsec.learning.extraVolumes [array] Additional volumes for the open-appsec appsec.learning pod
    ## Example:
    ## extraVolumes:
    ##   - name: my-volume
    ##     emptyDir: {}
    ##
    extraVolumes: []
    ## @param appsec.learning.extraVolumeMounts [array] Additional volume mounts for the open-appsec appsec.learning container
    ## Example:
    ## extraVolumeMounts:
    ##   - name: my-volume
    ##     mountPath: /opt/startechnica/bav/my-stuff
    ##
    extraVolumeMounts: []
    ## @param appsec.learning.extraEnvVarsCMs [array] List of existing ConfigMap containing extra env vars for open-appsec appsec.learning nodes
    ##
    extraEnvVarsCMs: []
    ## @param appsec.learning.extraEnvVarsSecrets [array] List of secrets with extra environment variables for open-appsec appsec.learning pods
    ##
    extraEnvVarsSecrets: []
    ## @param appsec.learning.extraEnvVars [array] Array containing extra env vars to configure open-appsec appsec.learning
    ## For example:
    ## extraEnvVars:
    ##  - name: GF_DEFAULT_INSTANCE_NAME
    ##    value: my-instance
    ##
    extraEnvVars: []
    ## @param appsec.learning.extraConfigmaps [array] Array to mount extra ConfigMaps to configure open-appsec appsec.learning
    ## For example:
    ## extraConfigmaps:
    ##   - name: myconfigmap
    ##     mountPath: /opt/bitnami/desired-path
    ##     subPath: file-name.extension (optional)
    ##     readOnly: true
    ##
    extraConfigmaps: []
    ## @param appsec.learning.command [array] Override default container command (useful when using custom images)
    ##
    command: []
    ## @param appsec.learning.args [array] Override default container args (useful when using custom images)
    ##
    args: []

    ## Service parameters
    ##
    service:
      ## @param appsec.learning.service.type Kubernetes Service type
      ##
      type: ClusterIP
      ## @param appsec.learning.service.clusterIP Gunicorn service Cluster IP
      ## e.g.:
      ## clusterIP: None
      ##
      clusterIP: ""
      ## @param appsec.learning.service.ports.http AppSec learning HTTP service port
      ##
      ports:
        http: 80
        ## @param appsec.learning.service.ports.https Service HTTPS port
        https: 443
      ## @param appsec.learning.service.nodePorts.https Specify the nodePort value for the LoadBalancer and NodePort HTTPS service types
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
      ##
      nodePorts:
        ## @param appsec.learning.service.nodePorts.http Service NodePort for http
        http: ""
        https: ""
      ## @param appsec.learning.service.loadBalancerIP loadBalancerIP if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ##
      loadBalancerIP: ""
      ## @param appsec.learning.service.loadBalancerClass loadBalancerClass if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ##
      loadBalancerClass: ""
      ## @param appsec.learning.service.loadBalancerSourceRanges [array] loadBalancerSourceRanges if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ## e.g:
      ## loadBalancerSourceRanges:
      ##   - 10.10.10.0/24
      ##
      loadBalancerSourceRanges: []
      ## @param appsec.learning.service.annotations [object] Provide any additional annotations which may be required.
      ## This can be used to set the LoadBalancer service type to internal only.
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#internal-load-balancer
      ##
      annotations: {}
      ## @param appsec.learning.service.externalTrafficPolicy Gunicorn service external traffic policy
      ## ref https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
      ##
      externalTrafficPolicy: Cluster
      ## @param appsec.learning.service.extraPorts [array] Extra port to expose on Gunicorn service
      ##
      extraPorts: []
      ## @param appsec.learning.service.sessionAffinity Session Affinity for Kubernetes service, can be "None" or "ClientIP"
      ## If "ClientIP", consecutive client requests will be directed to the same Pod
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
      ##
      sessionAffinity: None
      ## @param appsec.learning.service.sessionAffinityConfig [object] Additional settings for the sessionAffinity
      ## sessionAffinityConfig:
      ##   clientIP:
      ##     timeoutSeconds: 300
      ##
      sessionAffinityConfig: {}

    ## Enable persistence using Persistent Volume Claims
    ## ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
    ##
    persistence:
      ## @param appsec.learning.persistence.enabled Enable persistent storage
      enabled: false
      ## If defined, storageClassName: <storageClass>
      ## If set to "-", storageClassName: "", which disables dynamic provisioning
      ## If undefined (the default) or set to null, no storageClassName spec is
      ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
      ##   GKE, AWS & OpenStack)
      ##
      ## @param appsec.learning.persistence.storageClass StorageClass for the PVC
      storageClass: ""
      ## @param appsec.learning.persistence.accessModes Access modes for the PVC
      accessModes:
        - ReadWriteMany
      ## @param appsec.learning.persistence.size Size of the PVC
      size: 10Gi
      ## @param appsec.learning.persistence.annotations [object] Annotations for the PVC
      annotations: {}
      ## @param appsec.learning.persistence.existingClaim Use an existing PVC instead of creating one
      existingClaim: ""
      ## If set, the PVC can't have a PV dynamically provisioned for it
      ## E.g.
      ## selector:
      ##   matchLabels:
      ##     app: my-app
      ##
      ## @param appsec.learning.persistence.selector [object] Selector to match an existing PV
      selector: {}
      ##
      ## @param appsec.learning.persistence.dataSource [object] Source resource to populate the PV
      dataSource: {}

    ## ServiceAccount configuration for the open-appsec Learning
    ##
    serviceAccount:
      ## @param appsec.learning.serviceAccount.create Specifies whether a ServiceAccount should be created
      ##
      create: true
      ## @param appsec.learning.serviceAccount.name The name of the ServiceAccount to use.
      ## If not set and create is true, a name is generated using the common.names.fullname template
      ##
      name: ""
      ## @param appsec.learning.serviceAccount.automountServiceAccountToken Automount service account token for the open-appsec learning service account
      ##
      automountServiceAccountToken: false
      ## @param appsec.learning.serviceAccount.annotations [object] Annotations for service account. Evaluated as a template. Only used if `create` is `true`.
      ##
      annotations: {}

    ## Network Policies
    ## ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    ##
    networkPolicy:
      ## @param appsec.learning.networkPolicy.enabled Render a NetworkPolicy for the learning Pod
      ##
      enabled: false
      ## @param appsec.learning.networkPolicy.allowExternal When `false`, only Pods carrying the `<fullname>-learning-client: "true"` label (or sibling open-appsec components) may connect on the container port.
      ##
      allowExternal: true
      ## @param appsec.learning.networkPolicy.allowExternalEgress Allow egress to any destination. When `false`, egress is restricted to DNS + the storage component.
      ##
      allowExternalEgress: true
      ## @param appsec.learning.networkPolicy.extraIngress [array] Extra ingress rules appended verbatim to the NetworkPolicy
      ##
      extraIngress: []
      ## @param appsec.learning.networkPolicy.extraEgress [array] Extra egress rules appended verbatim to the NetworkPolicy
      ##
      extraEgress: []
      ## @param appsec.learning.networkPolicy.ingressNSMatchLabels [object] Namespace label selector used to widen ingress to specific namespaces (e.g. injection-target namespaces)
      ## @param appsec.learning.networkPolicy.ingressNSPodMatchLabels [object] Pod label selector applied inside namespaces matched by `ingressNSMatchLabels`
      ##
      ingressNSMatchLabels: {}
      ingressNSPodMatchLabels: {}


  ## @section AppSec — Storage component

  storage:
    ## @param appsec.storage.enabled Enable storage
    enabled: true
    ## open-appsec Storage image version
    ## ref: 
    ## @skip storage.image.tag open-appsec Storage image tag (immutable tags are recommended)
    ##
    image:
      ## @param appsec.storage.image.registry Image registry
      registry: ghcr.io
      ## @param appsec.storage.image.repository Image repository
      repository: openappsec/smartsync-shared-files
      ## @param appsec.storage.image.tag Image tag (immutable tags are recommended)
      tag: latest
      ## @param appsec.storage.image.digest Image digest in the way sha256:aa.... (overrides tag when set)
      digest: ""
      ## @param appsec.storage.image.debug Enable container image debug mode
      debug: false
      ## Specify a imagePullPolicy
      ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
      ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
      ##
      ## @param appsec.storage.image.pullPolicy Image pull policy
      pullPolicy: Always
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ##
      ## pullSecrets:
      ##   - myRegistryKeySecretName
      ## @param appsec.storage.image.pullSecrets [array] Image pull secrets
      pullSecrets: []

    ## @param appsec.storage.replicaCount Number of open-appsec appsec.storage nodes
    ##
    replicaCount: 1
    ## @param appsec.storage.revisionHistoryLimit  
