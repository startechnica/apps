  initContainers: []
  ## @param webhook.extraVolumes [array] Additional volumes for the open-appsec webhook pod
  ## Example:
  ## extraVolumes:
  ##   - name: my-volume
  ##     emptyDir: {}
  ##
  extraVolumes: []
  ## @param webhook.extraVolumeMounts [array] Additional volume mounts for the open-appsec webhook container
  ## Example:
  ## extraVolumeMounts:
  ##   - name: my-volume
  ##     mountPath: /opt/startechnica/bav/my-stuff
  ##
  extraVolumeMounts: []
  ## @param webhook.extraEnvVarsCMs [array] List of existing ConfigMap containing extra env vars for open-appsec webhook nodes
  ##
  extraEnvVarsCMs: []
  ## @param webhook.extraEnvVarsSecrets [array] List of secrets with extra environment variables for open-appsec webhook pods
  ##
  extraEnvVarsSecrets: []
  ## @param webhook.extraEnvVars [array] Array containing extra env vars to configure open-appsec webhook
  ## For example:
  ## extraEnvVars:
  ##  - name: GF_DEFAULT_INSTANCE_NAME
  ##    value: my-instance
