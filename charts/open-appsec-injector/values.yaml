## @section Playground mode

playground:
  enabled: false

## CrowdSec is an open-source project which provides crowd-sourced protection against malicious IP addresses.
## ref: https://docs.crowdsec.net/u/getting_started/installation/kubernetes
##

## @section CrowdSec integration

crowdSec:
  ## @param crowdSec.enabled  Enables or disables CrowdSec integration. When set to true, the application will query CrowdSec to obtain security decisions (ban, captcha, allow, etc.)
  ## and enforce them.
  ##
  enabled: false
  ## @param crowdSec.mode  Defines how the application behaves when CrowdSec provides a decision.
  ## - prevent — actively blocks malicious IPs based on CrowdSec decisions.
  ## - monitor — logs malicious activity but does not block traffic.
  ##
  mode: prevent
  ## @param crowdSec.logging  Controls whether the CrowdSec middleware logs decisions.
  ## - enabled — logs when a request is allowed, blocked, or challenged.
  ## - disabled — suppresses all CrowdSec-related logs.
  ##
  logging: enabled
  ## The application connects to this URL to get the latest IP bans and allows.
  ##
  api:
    ## @param crowdSec.api.url url for api
    url: http://crowdsec-service:8080/v1/decisions/stream
  auth:
    ## @param crowdSec.auth.method  Defines how the application authenticates against CrowdSec LAPI.
    ## - apikey — uses an API key for authentication (recommended).
    ## - none — no authentication (only for trusted environments).
    ## @param crowdSec.auth.data  The authentication data used by the selected auth method.
    ## If auth.method: apikey, this value is the API key issued by CrowdSec LAPI. Must match the key configured in your CrowdSec .yaml configurations or cscli output.
    ##
    method: apikey
    data: "00000000000000000000000000000000"

## Fog is the backend service used by the OpenAppSec agent to retrieve configuration, policies, threat intelligence updates, and to send telemetry. By default, the
## agent communicates with the standard Fog endpoint defined by the system.
##

## @section Custom Fog endpoint

customFog:
  ## @param customFog.enabled  Enables use of a custom Fog service endpoint. Set to true when you need the agent to connect to a specific Fog URL
  ##  (e.g., private environment, dedicated tenant, or custom Check Point endpoint).
  ## @param customFog.fogAddress  Full HTTPS URL of the custom Fog service. Must be reachable from the agent.
  ##
  enabled: true
  fogAddress: "https://inext-agents.cloud.ngen.checkpoint.com/"

## The default configuration files provided above are set to detect-learn mode, which is recommended for new deployments to allow the machine
## learning engine sufficient learning before moving to prevent-learn mode. You can then later easily reconfigure the open-appsec-best-practice-policy custom policy 
## resource to prevent-learn mode.
##

## @section Default configurations

defaultConfigurations:
  ## @param defaultConfigurations.enabled Render a baseline Policy + AccessControlPractice + ThreatPreventionPractice + CustomResponse + LogTrigger set so the agent has something to enforce on first start. Each preset lives in `templates/default-configs/<mode>/`.
  ##
  enabled: false
  ## @param defaultConfigurations.mode Preset to render when `defaultConfigurations.enabled=true`. Picks a directory under `templates/default-configs/`. Options:
  ##   - "detect-learn" : log violations, do NOT block; engine continues building its model from live samples (safe first-deploy mode).
  ##   - "prevent-learn": block known-bad traffic AND keep learning from live samples (steady-state production with adaptive tuning).
  ##   - "prevent"      : block known-bad traffic against a frozen model; learning disabled (locked-down production after `prevent-learn` has stabilized).
  ## The `kind:` rendered (cluster-scoped `Policy` vs namespaced `PolicyNS`) is governed by `crds.scope`, not by this mode value.
  ##
  mode: detect-learn

## Agent is injected as an additional sidecar container alongside the Istio proxy inside application pods. When deployed with Istio, the agent receives mirrored
## inbound traffic from Envoy and applies advanced WAF security controls such as attack detection, anomaly scoring, and policy enforcement. It operates transparently
## to the application and Istio proxy, requiring no application changes. The injector automates the placement and configuration of the agent based on namespace or pod
## labels, enabling seamless security integration across the mesh.

## @section Agent parameters

agent:
  ## @param agent.cpu Container CPU request
  cpu: "200m"
  ## open-appsec Agent image version
  ## ref: 
  ## @param agent.image.registry [default: REGISTRY_NAME] open-appsec Agent image registry
  ## @param agent.image.repository [default: REPOSITORY_NAME/open-appsec Agent] open-appsec Agent image repository
  ## @skip agent.image.tag open-appsec Agent image tag (immutable tags are recommended)
  ## @param agent.image.digest open-appsec Agent image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  ## @param agent.image.debug Enable debug mode for open-appsec Agent image
  ## @param agent.image.pullPolicy open-appsec Agent image pull policy
  ## @param agent.image.pullSecrets [array] open-appsec Agent image pull secrets
  ##
  image:
    registry: ghcr.io
    repository: openappsec/agent
    tag: "1.1.34"
    digest: ""
    debug: false
    ## Specify a imagePullPolicy
    ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
    ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
    ##
    pullPolicy: IfNotPresent
    ## Optionally specify an array of imagePullSecrets.
    ## Secrets must be manually created in the namespace.
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    ##
    ## pullSecrets:
    ##   - myRegistryKeySecretName
    pullSecrets: []

  ## @param agent.namespaceSelector [object] Selector to match namespaces for injection. The agent will be injected in the pods in the namespaces matching this selector. If not set, the agent will be injected in all namespaces.
  ##
  namespaceSelector:
    matchLabels:
      inject-waf-attachment: "true"
  ## @param agent.objectSelector [object] Selector to match pods for injection. If not set, the agent will be injected in all the pods in the namespaces matching
  ##   the namespaceSelector. If set, only the pods matching this selector will have the agent injected.
  ##
  objectSelector: {}

  ## @param agent.userEmail Email address registered with the open-appsec backend
  userEmail: ""
  ## @param agent.agentToken Deployment profile token from central management WebUI (SaaS) to connect your open-appsec deployment to the central WebUI (SaaS), also make
  ## sure to set appsec.mode to managed when you provide the token.
  ## ref: https://docs.openappsec.io/getting-started/using-the-web-ui-saas/create-a-profile
  ##
  agentToken: ""

  ## @param agent.initContainer.image.registry [default: REGISTRY_NAME] open-appsec Agent init container image registry
  ## @param agent.initContainer.image.repository [default: REPOSITORY_NAME/open-appsec Agent init container] open-appsec Agent init container image repository
  ## @param agent.initContainer.image.tag open-appsec Agent init container image tag (immutable tags are recommended)
  ## @param agent.initContainer.image.digest open-appsec Agent init container image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  ## @param agent.initContainer.image.debug Enable debug mode for open-appsec Agent init container image
  ##
  initContainer:
    image:
      registry: ghcr.io
      repository: openappsec/openappsec-envoy-filters
      tag: "1.1.34"
      digest: ""
      debug: false

  ## @param agent.command Override default container command (useful when using custom images)
  ##
  command:
    - /cp-nano-agent
  ## @param agent.args [array] Override default container args (useful when using custom images)
  ##
  args: []

  ## Enable persistence using Persistent Volume Claims
  ## ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  ## @param agent.persistence.enabled Enable persistence
  ##
  persistence:
    enabled: false
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    config:
      ## @param agent.persistence.config.name Name of the config PVC
      name: open-appsec-conf
      ## @param agent.persistence.config.storageClass StorageClass of the config PVC
      storageClass: ""
      ## @param agent.persistence.config.accessModes Access modes of the config PVC
      accessModes:
        - ReadWriteOnce
      ## @param agent.persistence.config.size Size of the config PVC
      size: 1Gi
      ## @param agent.persistence.config.annotations [object] Annotations for the config PVC
      annotations: {}
      ## @param agent.persistence.config.existingClaim Use an existing PVC instead of creating one (for config)
      existingClaim: ""
      ## @param agent.persistence.config.selector [object] Selector to match an existing Persistent Volume for Agent config data PVC
      ## If set, the PVC can't have a PV dynamically provisioned for it
      ## E.g.
      ## selector:
      ##   matchLabels:
      ##     app: my-app
      ##
      selector: {}
      ## @param agent.persistence.config.dataSource [object] Custom PVC data source
      ##
      dataSource: {}
    data:
      ## @param agent.persistence.data.name Name of the data PVC
      name: open-appsec-data
      ## @param agent.persistence.data.storageClass StorageClass of the data PVC
      storageClass: ""
      ## @param agent.persistence.data.accessModes Access modes of the data PVC
      accessModes:
        - ReadWriteOnce
      ## @param agent.persistence.data.size Size of the data PVC
      size: 10Gi
      ## @param agent.persistence.data.annotations [object] Annotations for the data PVC
      annotations: {}
      ## @param agent.persistence.data.existingClaim Use an existing PVC instead of creating one (for data)
      existingClaim: ""
      ## @param agent.persistence.data.selector [object] Selector to match an existing Persistent Volume for Agent config data PVC
      ## If set, the PVC can't have a PV dynamically provisioned for it
      ## E.g.
      ## selector:
      ##   matchLabels:
      ##     app: my-app
      ##
      selector: {}
      ## @param agent.persistence.data.dataSource [object] Custom PVC data source
      ##
      dataSource: {}

