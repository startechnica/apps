## @section Global parameters

## @param global.imageRegistry Global Docker image registry
## @param global.imagePullSecrets [array] Global Docker registry secret names as an array
## @param global.defaultStorageClass Global default StorageClass for Persistent Volume(s)
##
global:
  imageRegistry: ""
  ## E.g.
  ## imagePullSecrets:
  ##   - myRegistryKeySecretName
  ##
  imagePullSecrets: []
  defaultStorageClass: ""
  ## Compatibility adaptations for Kubernetes platforms
  ##
  compatibility:
    ## Compatibility adaptations for Openshift
    ##
    openshift:
      ## @param global.compatibility.openshift.adaptSecurityContext Adapt the securityContext sections of the deployment to make them compatible with Openshift restricted-v2 SCC: remove runAsUser, runAsGroup and fsGroup and let the platform use their allowed default IDs. Possible values: auto (apply if the detected running cluster is Openshift), force (perform the adaptation always), disabled (do not perform adaptation)
      ##
      adaptSecurityContext: auto
    ## @param global.compatibility.omitEmptySeLinuxOptions If set to true, removes the seLinuxOptions from the securityContexts when it is set to an empty object
    ##
    omitEmptySeLinuxOptions: false

## CRDs live in the sister chart `open-appsec-crd`. Two installation modes:
##
##   1. crds.enabled = true (default, bundled):
##      This chart pulls `open-appsec-crd` in as a subchart and renders the
##      CRDs alongside the application. One-shot install, no separate step.
##
##   2. crds.enabled = false (decoupled):
##      Operator installs `open-appsec-crd` separately, once cluster-wide,
##      and upgrades its schema on its own cadence:
##         helm install open-appsec-crd startechnica/open-appsec-crd
##      Recommended when multiple injector releases share one CRD set, or
##      when CRD lifecycle is managed by a different team than the app.
##
## See charts/open-appsec-crd/README.md for the full list of registered
## CustomResourceDefinitions. `crds.scope` below is a runtime hint passed
## to the webhook container — it doesn't gate CRD rendering.
##
crds:
  ## @param crds.enabled Bundle the `open-appsec-crd` subchart with this release. Disable when CRDs are managed by a separately-installed `open-appsec-crd` chart (multiple injector releases sharing one schema, or CRD lifecycle owned by a different team).
  ##
  enabled: true
  ## @param crds.scope CRD scope the webhook expects to consult at runtime (`cluster` or `namespaced`). Must match what was installed via the `open-appsec-crd` chart (bundled or separate). Plumbed into the webhook container as `CRDS_SCOPE`.
  ##
  scope: cluster

