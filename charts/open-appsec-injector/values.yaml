    ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    ## @param appsec.storage.resourcesPreset Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, 
    ## large, xlarge, 2xlarge). This is ignored if resources is set (resources is recommended for production).
    ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    ##
    resourcesPreset: "gs-3xsmall"
    ## @param appsec.storage.resources [object] Set container requests and limits for different resources like CPU or memory (essential for production workloads)
    ## Example:
    ## resources:
    ##   requests:
    ##     cpu: 2
    ##     memory: 512Mi
    ##   limits:
    ##     cpu: 3
    ##     memory: 1024Mi
    ##
    resources: {}
    ## open-appsec appsec.storage containers' liveness probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.storage.livenessProbe.enabled Enable livenessProbe
    ## @param appsec.storage.livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
    ## @param appsec.storage.livenessProbe.periodSeconds Period seconds for livenessProbe
    ## @param appsec.storage.livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
    ## @param appsec.storage.livenessProbe.failureThreshold Failure threshold for livenessProbe
    ## @param appsec.storage.livenessProbe.successThreshold Success threshold for livenessProbe
    ##
    livenessProbe:
      enabled: true
      httpGet:
        ## @param appsec.storage.livenessProbe.httpGet.path HTTP path for liveness probe
        path: /health/live
        ## @param appsec.storage.livenessProbe.httpGet.port HTTP port for liveness probe
        port: http
        ## @param appsec.storage.livenessProbe.httpGet.scheme HTTP scheme for liveness probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 20
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 10
    ## open-appsec appsec.storage containers' readinessProbe probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.storage.readinessProbe.enabled Enable readinessProbe
    ## @param appsec.storage.readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
    ## @param appsec.storage.readinessProbe.periodSeconds Period seconds for readinessProbe
    ## @param appsec.storage.readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
    ## @param appsec.storage.readinessProbe.failureThreshold Failure threshold for readinessProbe
    ## @param appsec.storage.readinessProbe.successThreshold Success threshold for readinessProbe
    ##
    readinessProbe:
      enabled: true
      httpGet:
        ## @param appsec.storage.readinessProbe.httpGet.path HTTP path for readiness probe
        path: /health/ready
        ## @param appsec.storage.readinessProbe.httpGet.port HTTP port for readiness probe
        port: http
        ## @param appsec.storage.readinessProbe.httpGet.scheme HTTP scheme for readiness probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 3
      periodSeconds: 15
      successThreshold: 1
      timeoutSeconds: 10
    ## @param appsec.storage.startupProbe.enabled Enable startupProbe
    ## @param appsec.storage.startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
    ## @param appsec.storage.startupProbe.periodSeconds Period seconds for startupProbe
    ## @param appsec.storage.startupProbe.timeoutSeconds Timeout seconds for startupProbe
    ## @param appsec.storage.startupProbe.failureThreshold Failure threshold for startupProbe
    ## @param appsec.storage.startupProbe.successThreshold Success threshold for startupProbe
    ##
    startupProbe:
      enabled: false
      httpGet:
        ## @param appsec.storage.startupProbe.httpGet.path HTTP path for startup probe
        path: ""
        ## @param appsec.storage.startupProbe.httpGet.port HTTP port for startup probe
        port: http
        ## @param appsec.storage.startupProbe.httpGet.scheme HTTP scheme for startup probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 30
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5
    ## @param appsec.storage.customLivenessProbe [object] Custom livenessProbe that overrides the default one
    ##
    customLivenessProbe: {}
    ## @param appsec.storage.customReadinessProbe [object] Custom readinessProbe that overrides the default one
    ##
    customReadinessProbe: {}
    ## @param appsec.storage.customStartupProbe [object] Custom startupProbe that overrides the default one
    ##
    customStartupProbe: {}
    ## @param appsec.storage.lifecycleHooks [object] for the open-appsec appsec.storage container(s) to automate configuration before or after startup
    ##
    lifecycleHooks: {}
    ## @param appsec.storage.sidecars [array] Attach additional sidecar containers to the open-appsec appsec.storage pod
    ## Example:
    ## sidecars:
    ##   - name: your-image-name
    ##     image: your-image
    ##     imagePullPolicy: Always
    ##     ports:
    ##       - name: portname
    ##         containerPort: 1234
    ##
    sidecars: []
    ## @param appsec.storage.initContainers [array] Add additional init containers to the open-appsec appsec.storage pod(s)
    ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
    ## e.g:
    ## initContainers:
    ##  - name: your-image-name
    ##    image: your-image
    ##    imagePullPolicy: Always
    ##    command: ['sh', '-c', 'echo "hello world"']
    ##
    initContainers: []
    ## @param appsec.storage.extraVolumes [array] Additional volumes for the open-appsec appsec.storage pod
    ## Example:
    ## extraVolumes:
    ##   - name: my-volume
    ##     emptyDir: {}
    ##
    extraVolumes: []
    ## @param appsec.storage.extraVolumeMounts [array] Additional volume mounts for the open-appsec appsec.storage container
    ## Example:
    ## extraVolumeMounts:
    ##   - name: my-volume
    ##     mountPath: /opt/startechnica/bav/my-stuff
    ##
    extraVolumeMounts: []
    ## @param appsec.storage.extraEnvVarsCMs [array] List of existing ConfigMap containing extra env vars for open-appsec appsec.storage nodes
    ##
    extraEnvVarsCMs: []
    ## @param appsec.storage.extraEnvVarsSecrets [array] List of secrets with extra environment variables for open-appsec appsec.storage pods
    ##
    extraEnvVarsSecrets: []
    ## @param appsec.storage.extraEnvVars [array] Array containing extra env vars to configure open-appsec appsec.storage
    ## For example:
    ## extraEnvVars:
    ##  - name: GF_DEFAULT_INSTANCE_NAME
    ##    value: my-instance
    ##
    extraEnvVars: []
    ## @param appsec.storage.extraConfigmaps [array] Array to mount extra ConfigMaps to configure open-appsec appsec.storage
    ## For example:
    ## extraConfigmaps:
    ##   - name: myconfigmap
    ##     mountPath: /opt/bitnami/desired-path
    ##     subPath: file-name.extension (optional)
    ##     readOnly: true
    ##
    extraConfigmaps: []
    ## @param appsec.storage.command [array] Override default container command (useful when using custom images)
    ##
    command: []
    ## @param appsec.storage.args [array] Override default container args (useful when using custom images)
    ##
    args: []

    ## Enable persistence using Persistent Volume Claims
    ## ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
    ## @param appsec.storage.persistence.enabled Enable persistence
    ## @param appsec.storage.persistence.accessModes Persistent Volume Access Modes
    ## @param appsec.storage.persistence.annotations [object] Persistent Volume Claim annotations
    ## @param appsec.storage.persistence.storageClass Storage class to use with the PVC
    ## @param appsec.storage.persistence.existingClaim If you want to reuse an existing claim, you can pass the name of the PVC using the existingClaim variable.
    ## @param appsec.storage.persistence.size Size for the PV
    ##
    persistence:
      enabled: false
      ## If defined, storageClassName: <storageClass>
      ## If set to "-", storageClassName: "", which disables dynamic provisioning
      ## If undefined (the default) or set to null, no storageClassName spec is
      ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
      ##   GKE, AWS & OpenStack)
      ##
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      annotations: {}
      existingClaim: ""
      ## @param appsec.storage.persistence.selector [object] Selector to match an existing Persistent Volume for Storage PVC
      ## If set, the PVC can't have a PV dynamically provisioned for it
      ## E.g.
      ## selector:
      ##   matchLabels:
      ##     app: my-app
      ##
      selector: {}
      ## @param appsec.storage.persistence.dataSource [object] Custom PVC data source
      ##
      dataSource: {}

    ## Service parameters
    ##
    service:
      ## @param appsec.storage.service.type Kubernetes Service type
      ##
      type: ClusterIP
      ## @param appsec.storage.service.clusterIP Gunicorn service Cluster IP
      ## e.g.:
      ## clusterIP: None
      ##
      clusterIP: ""
      ## @param appsec.storage.service.ports.http AppSec Storage HTTP service port
      ##
      ports:
        http: 80
        ## @param appsec.storage.service.ports.https Service HTTPS port
        https: 443
      ## @param appsec.storage.service.nodePorts.https Specify the nodePort value for the LoadBalancer and NodePort HTTPS service types
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
      ##
      nodePorts:
        ## @param appsec.storage.service.nodePorts.http Service NodePort for http
        http: ""
        https: ""
      ## @param appsec.storage.service.loadBalancerIP loadBalancerIP if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ##
      loadBalancerIP: ""
      ## @param appsec.storage.service.loadBalancerClass loadBalancerClass if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ##
      loadBalancerClass: ""
      ## @param appsec.storage.service.loadBalancerSourceRanges [array] loadBalancerSourceRanges if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
      ## e.g:
      ## loadBalancerSourceRanges:
      ##   - 10.10.10.0/24
      ##
      loadBalancerSourceRanges: []
      ## @param appsec.storage.service.annotations [object] Provide any additional annotations which may be required.
      ## This can be used to set the LoadBalancer service type to internal only.
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#internal-load-balancer
      ##
      annotations: {}
      ## @param appsec.storage.service.externalTrafficPolicy Gunicorn service external traffic policy
      ## ref https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
      ##
      externalTrafficPolicy: Cluster
      ## @param appsec.storage.service.extraPorts [array] Extra port to expose on Gunicorn service
      ##
      extraPorts: []
      ## @param appsec.storage.service.sessionAffinity Session Affinity for Kubernetes service, can be "None" or "ClientIP"
      ## If "ClientIP", consecutive client requests will be directed to the same Pod
      ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
      ##
      sessionAffinity: None
      ## @param appsec.storage.service.sessionAffinityConfig [object] Additional settings for the sessionAffinity
      ## sessionAffinityConfig:
      ##   clientIP:
      ##     timeoutSeconds: 300
      ##
      sessionAffinityConfig: {}

    ## ServiceAccount configuration for the open-appsec Storage
    ##
    serviceAccount:
      ## @param appsec.storage.serviceAccount.create Specifies whether a ServiceAccount should be created
      ##
      create: true
      ## @param appsec.storage.serviceAccount.name The name of the ServiceAccount to use.
      ## If not set and create is true, a name is generated using the common.names.fullname template
      ##
      name: ""
      ## @param appsec.storage.serviceAccount.automountServiceAccountToken Automount service account token for the open-appsec storage service account
      ##
      automountServiceAccountToken: true
      ## @param appsec.storage.serviceAccount.annotations [object] Annotations for service account. Evaluated as a template. Only used if `create` is `true`.
      ##
      annotations: {}

    ## Network Policies
    ## ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    ##
    networkPolicy:
      ## @param appsec.storage.networkPolicy.enabled Render a NetworkPolicy for the storage Pod
      ##
      enabled: false
      ## @param appsec.storage.networkPolicy.allowExternal When `false`, only Pods labeled `app.kubernetes.io/part-of: open-appsec` (or `<fullname>-storage-client: "true"`) may connect on the container port.
      ##
      allowExternal: true
      ## @param appsec.storage.networkPolicy.allowExternalEgress Allow egress to any destination. When `false`, egress is restricted to DNS.
      ##
      allowExternalEgress: true
      ## @param appsec.storage.networkPolicy.extraIngress [array] Extra ingress rules appended verbatim to the NetworkPolicy
      ##
      extraIngress: []
      ## @param appsec.storage.networkPolicy.extraEgress [array] Extra egress rules appended verbatim to the NetworkPolicy
      ##
      extraEgress: []
      ## @param appsec.storage.networkPolicy.ingressNSMatchLabels [object] Namespace label selector used to widen ingress to specific namespaces
      ## @param appsec.storage.networkPolicy.ingressNSPodMatchLabels [object] Pod label selector applied inside namespaces matched by `ingressNSMatchLabels`
      ##
      ingressNSMatchLabels: {}
      ingressNSPodMatchLabels: {}


  ## @section AppSec — Tuning component

  tuning:
    ## @param appsec.tuning.enabled Enable tuning
    enabled: false

    ## Config-file overrides for the tuning binary. The smartsync-tuning
    ## binary reads its bootstrap config (`bootstrapConfig.yaml`) and schema
    ## (`tableSchema.json`) from `/app/configs/` inside the container; both
    ## are baked in at build time. To override either, supply an existing
    ## ConfigMap (BYO) holding the new content; the chart mounts the two
    ## keys via `subPath` at the same paths so they shadow the baked-in
    ## files without disturbing the rest of the directory (e.g.,
    ## `error-responses.json`).
    ##
    ## Useful knobs in the bootstrap config that the chart does NOT expose
    ## as env vars (and therefore are only reachable via this override):
    ##   - log.level, scheduler.{tuningInterval,taskInterval,tokenizerInterval}
    ##   - etcd.{hosts,timeout}
    ##   - rp.{baseUrl,policyUrl}
    ##   - errors.code, server.timeout, tuning.threshold.*
    ##
    ## Database connection details (`query.db.{host,port,user,password,sslmode}`)
    ## already auto-bind to `QUERY_DB_*` env vars via viper.AutomaticEnv at
    ## runtime, so they're independent of this override. Database NAME is
    ## NOT configurable today — it's hardcoded as a literal in the binary's
    ## connection-string format (see datatube.go) regardless of the
    ## tableSchema.json `name` field. Pending an upstream patch.
    ##
    ## Sources:
    ##   - https://github.com/openappsec/smartsync-tuning/blob/main/internal/pkg/query/datatube.go
    ##   - https://github.com/openappsec/smartsync-tuning/blob/main/configs/bootstrapConfig.yaml
    ##   - https://github.com/openappsec/smartsync-tuning/blob/main/configs/tableSchema.json
    ##
    configs:
      bootstrap:
        ## @param appsec.tuning.configs.bootstrap.existingConfigMap Name of an existing ConfigMap holding `bootstrapConfig.yaml` and `tableSchema.json` data keys. When set, the chart mounts both keys into the tuning pod at `/app/configs/` via `subPath`, shadowing the baked-in defaults. Empty (default) means the pod uses the container's baked-in config and the chart renders no bootstrap volume.
        ##
        existingConfigMap: ""

    ## open-appsec Tuning image version
    ## ref: 
    ## @skip tuning.image.tag open-appsec Tuning image tag (immutable tags are recommended)
    ##
    image:
      ## @param appsec.tuning.image.registry Image registry
      registry: ghcr.io
      ## @param appsec.tuning.image.repository Image repository
      repository: openappsec/smartsync-tuning
      ## @param appsec.tuning.image.tag Image tag (immutable tags are recommended)
      tag: latest
      ## @param appsec.tuning.image.digest Image digest in the way sha256:aa.... (overrides tag when set)
      digest: ""
      ## @param appsec.tuning.image.debug Enable container image debug mode
      debug: false
      ## Specify a imagePullPolicy
      ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
      ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
      ##
      ## @param appsec.tuning.image.pullPolicy Image pull policy
      pullPolicy: Always
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ##
      ## pullSecrets:
      ##   - myRegistryKeySecretName
      ## @param appsec.tuning.image.pullSecrets [array] Image pull secrets
      pullSecrets: []

    ## @param appsec.tuning.replicaCount Number of open-appsec appsec.tuning nodes
    ##
    replicaCount: 1
    ## @param appsec.tuning.revisionHistoryLimit  
    ##
    revisionHistoryLimit: 1
    ## @param appsec.tuning.updateStrategy.type Set up update strategy for open-appsec appsec.tuning installation.
    ## Set to Recreate if you use persistent volume that cannot be mounted by more than one pods to make sure the pods is destroyed first.
    ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
    ## Example:
    ## updateStrategy:
    ##  type: RollingUpdate
    ##  rollingUpdate:
    ##    maxSurge: 25%
    ##    maxUnavailable: 25%
    ##
    updateStrategy:
      type: RollingUpdate
    ## @param appsec.tuning.automountServiceAccountToken Mount Service Account token in pod
    ##
    automountServiceAccountToken: true
    ## @param appsec.tuning.hostAliases [array] Add deployment host aliases
    ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
    ##
    hostAliases: []
    ## @param appsec.tuning.schedulerName Alternative scheduler
    ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
    ##
    schedulerName: ""
    ## @param appsec.tuning.terminationGracePeriodSeconds In seconds, time the given to the open-appsec appsec.tuning pod needs to terminate gracefully
    ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods
    ##
    terminationGracePeriodSeconds: ""
    ## @param appsec.tuning.priorityClassName Priority class name
    ## ref: https://kubernetes.io/docs/concepts/configuration/pod-priority-preemption/
    ##
    priorityClassName: ""
    ## @param appsec.tuning.deploymentAnnotations [object] Annotations to add to the deployment
    ##
    deploymentAnnotations: {}
    ## @param appsec.tuning.podLabels [object] Extra labels for open-appsec appsec.tuning pods
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
    ##
    podLabels: {}
    ## @param appsec.tuning.podAnnotations [object] open-appsec appsec.tuning Pod annotations
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
    ##
    podAnnotations: {}
    ## @param appsec.tuning.podAffinityPreset Pod affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
    ##
    podAffinityPreset: ""
    ## @param appsec.tuning.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
    ##
    podAntiAffinityPreset: soft
    ## @param appsec.tuning.containerName  Name of the container
    ##
    containerName: tuning
    ## @param appsec.tuning.containerPorts.http Container HTTP port
    ##
    containerPorts:
      http: 80
    ## @param appsec.tuning.extraPorts [array] Extra ports for container deployment
    ##
    extraPorts: []
    ## Node affinity preset
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
    ## @param appsec.tuning.nodeAffinityPreset.type Node affinity preset type. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    ## @param appsec.tuning.nodeAffinityPreset.key Node label key to match Ignored if `affinity` is set.
    ## @param appsec.tuning.nodeAffinityPreset.values [array] Node label values to match. Ignored if `affinity` is set.
    ##
    nodeAffinityPreset:
      type: ""
      ## E.g.
      ## key: "kubernetes.io/e2e-az-name"
      ##
      key: ""
      ## E.g.
      ## values:
      ##   - e2e-az1
      ##   - e2e-az2
      ##
      values: []
    ## @param appsec.tuning.affinity [object] Affinity for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
    ## Note: podAffinityPreset, podAntiAffinityPreset, and  nodeAffinityPreset will be ignored when it's set
    ##
    affinity: {}
    ## @param appsec.tuning.nodeSelector [object] Node labels for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
    ##
    nodeSelector: {}
    ## @param appsec.tuning.tolerations [array] Tolerations for pod assignment
    ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
    ##
    tolerations: []
    ## @param appsec.tuning.topologySpreadConstraints [array] Topology spread constraints rely on node labels to identify the topology domain(s) that each Node is in
    ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
    ##
    ## topologySpreadConstraints:
    ##   - maxSkew: 1
    ##     topologyKey: failure-domain.beta.kubernetes.io/zone
    ##     whenUnsatisfiable: DoNotSchedule
    ##
    topologySpreadConstraints: []
    ## @param appsec.tuning.podSecurityContext.enabled Enable securityContext on for open-appsec appsec.tuning deployment
    ## @param appsec.tuning.podSecurityContext.fsGroup Group to configure permissions for volumes
    ## @param appsec.tuning.podSecurityContext.sysctls [array] Set kernel settings using the sysctl interface
    ## @param appsec.tuning.podSecurityContext.seccompProfile [object] Set pod's Security Context seccomp profile
    ## @param appsec.tuning.podSecurityContext.supplementalGroups [array] Set filesystem extra groups
    ##
    podSecurityContext:
      enabled: true
      fsGroup: 1000
      # fsGroupChangePolicy: Always
      # runAsNonRoot: true
      sysctls: []
      supplementalGroups: []
      seccompProfile:
        type: RuntimeDefault
    ## Configure Container Security Context
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
    ## @param appsec.tuning.containerSecurityContext.enabled Enabled containers' Security Context
    ## @param appsec.tuning.containerSecurityContext.seLinuxOptions [object,nullable] Set SELinux options in container
    ## @param appsec.tuning.containerSecurityContext.runAsUser Set containers' Security Context runAsUser
    ## @param appsec.tuning.containerSecurityContext.runAsGroup Set containers' Security Context runAsGroup
    ## @param appsec.tuning.containerSecurityContext.runAsNonRoot Set container's Security Context runAsNonRoot
    ## @param appsec.tuning.containerSecurityContext.privileged Set container's Security Context privileged
    ## @param appsec.tuning.containerSecurityContext.readOnlyRootFilesystem Set container's Security Context readOnlyRootFilesystem
    ## @param appsec.tuning.containerSecurityContext.allowPrivilegeEscalation Set container's Security Context allowPrivilegeEscalation
    ## @param appsec.tuning.containerSecurityContext.seccompProfile.type Set container's Security Context seccomp profile
    ##
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      # capabilities:
      #   drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    ## open-appsec appsec.tuning containers' resource requests and limits
    ## ref: https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
    ## We usually recommend not to specify default resources and to leave this as a conscious
    ## choice for the user. This also increases chances charts run on environments with little
    ## resources, such as Minikube. If you do want to specify resources, uncomment the following
    ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    ## @param appsec.tuning.resourcesPreset Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, 
    ## large, xlarge, 2xlarge). This is ignored if resources is set (resources is recommended for production).
    ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    ##
    resourcesPreset: "gs-3xsmall"
    ## @param appsec.tuning.resources [object] Set container requests and limits for different resources like CPU or memory (essential for production workloads)
    ## Example:
    ## resources:
    ##   requests:
    ##     cpu: 2
    ##     memory: 512Mi
    ##   limits:
    ##     cpu: 3
    ##     memory: 1024Mi
    ##
    resources: {}
    ## open-appsec appsec.tuning containers' liveness probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.tuning.livenessProbe.enabled Enable livenessProbe
    ## @param appsec.tuning.livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
    ## @param appsec.tuning.livenessProbe.periodSeconds Period seconds for livenessProbe
    ## @param appsec.tuning.livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
    ## @param appsec.tuning.livenessProbe.failureThreshold Failure threshold for livenessProbe
    ## @param appsec.tuning.livenessProbe.successThreshold Success threshold for livenessProbe
    ##
    livenessProbe:
      enabled: true
      httpGet:
        ## @param appsec.tuning.livenessProbe.httpGet.path HTTP path for liveness probe
        path: /health/live
        ## @param appsec.tuning.livenessProbe.httpGet.port HTTP port for liveness probe
        port: http
        ## @param appsec.tuning.livenessProbe.httpGet.scheme HTTP scheme for liveness probe
        scheme: HTTP
      failureThreshold: 6
      initialDelaySeconds: 20
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 10
    ## open-appsec appsec.tuning containers' readinessProbe probe
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
    ## @param appsec.tuning.readinessProbe.enabled Enable readinessProbe
    ## @param appsec.tuning.readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
