  ##
  sidecars: []
  ## @param webhook.initContainers [array] Add additional init containers to the open-appsec webhook pod(s)
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
  ## e.g:
  ## initContainers:
  ##  - name: your-image-name
