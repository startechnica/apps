    annotations: {}
    ##
    ## @param metrics.serviceMonitor.jobLabel Label on the target service used as the job name
    jobLabel: ""
    ## TLS configuration for Prometheus scraping
    ## @param metrics.serviceMonitor.tlsConfig.insecureSkipVerify  Skip certificate verification (not recommended)
    ## @param metrics.serviceMonitor.tlsConfig.serverName  Override the TLS server name for SNI
    ## @param metrics.serviceMonitor.tlsConfig.caFile  Path to CA certificate file
    ## @param metrics.serviceMonitor.tlsConfig.certFile  Path to client certificate file
