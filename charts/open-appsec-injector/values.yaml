## @section TLS / cert-manager parameters
## -----------------------------------------------------------------------------
## Unified cert-manager TLS issuance for the chart. Today only the admission
## webhook consumes this (templates/webhook/Certificate.yaml), but the block
## lives at root so future TLS-bearing components can share a single Issuer.
##
## Three install modes for the webhook's serving cert:
##   1. tls.certManager.create=true (production): chart renders a Certificate
##      targeting issuerRef; cert-manager's cainjector populates the
##      MutatingWebhookConfiguration's caBundle and rotates the cert on
##      schedule. Requires cert-manager installed in the cluster.
##   2. tls.certManager.create=false + webhook.caBundle=<base64> +
##      webhook.tls.certificatesSecretName=<existing> (bring-your-own): chart
##      skips the Certificate and renders caBundle verbatim into the MWC.
##   3. tls.certManager.create=false + webhook.tls.autoGenerated=true
##      (PLACEHOLDER — not yet implemented): future Helm self-bootstrapping mode
##      using sprig genCA / genSignedCert + lookup-or-generate ceremony.
##
tls:
  certManager:
    ## @param tls.certManager.create Render a cert-manager `Certificate` for the admission webhook and inject the CA into its MutatingWebhookConfiguration via `cert-manager.io/inject-ca-from`. Requires cert-manager 1.0+.
    ##
    create: false
    ## @param tls.certManager.issuerRef [object] Reference to the cert-manager Issuer / ClusterIssuer that signs the webhook serving cert. Leave `name` empty to have the chart render its own self-signed `Issuer` in the release namespace (zero-config install).
    ##
    issuerRef:
      group: cert-manager.io
      kind: ClusterIssuer
      name: ""
    ## @param tls.certManager.duration Lifetime of the issued cert. cert-manager renews before expiry.
    ##
    duration: 8760h
    ## @param tls.certManager.renewBefore Window before expiry in which cert-manager rotates the cert.
    ##
    renewBefore: 720h


## @section Webhook parameters

webhook:
  ## @param webhook.nameOverride String to partially override app.fullname template (will maintain the release name)
  ##
  nameOverride: ""
  ## @param webhook.fullnameOverride String to fully override app.fullname template
  ##
  fullnameOverride: ""
  ## @param webhook.dnsPolicy DNS Policy for pod
  ## ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/
  ## E.g.
  ## dnsPolicy: ClusterFirst
  ##
  dnsPolicy: ""
  ## @param webhook.dnsConfig [object] DNS Configuration pod
  ## ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/
  ## E.g.
  ## dnsConfig:
  ##   options:
  ##   - name: ndots
  ##     value: "4"
  ##
  dnsConfig: {}
  ## @param webhook.hostUsers controls whether the container is allowed to share user namespaces
  ## with the host. When enabled, the pod may run with host-level user mappings,
  ## which can grant elevated privileges. This should remain disabled unless the
  ## workload explicitly requires host user access for system-level operations.
  ##
  hostUsers: false

  ## open-appsec Webhook image version
  ## ref: 
  ## @param webhook.image.registry [default: REGISTRY_NAME] open-appsec Webhook image registry
  ## @param webhook.image.repository [default: REPOSITORY_NAME/open-appsec Webhook] open-appsec Webhook image repository
  ## @skip webhook.image.tag open-appsec Webhook image tag (immutable tags are recommended)
  ## @param webhook.image.digest open-appsec Webhook image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  ## @param webhook.image.pullPolicy open-appsec Webhook image pull policy
  ## @param webhook.image.pullSecrets [array] open-appsec Webhook image pull secrets
  ##
  image:
    registry: ghcr.io
    repository: openappsec/openappsec-waf-webhook
    tag: "1.1.34"
    digest: ""
    ## @param webhook.image.debug Enable container image debug mode
    debug: false
    ## Specify a imagePullPolicy
    ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
    ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
    ##
    pullPolicy: IfNotPresent
    ## Optionally specify an array of imagePullSecrets.
    ## Secrets must be manually created in the namespace.
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    ##
    ## pullSecrets:
    ##   - myRegistryKeySecretName
    pullSecrets: []

  ## @param webhook.name Name of the MutatingWebhookConfiguration and webhook service
  ##
  name: openappsec-waf.injector.cp
  # name: waf-injector.open-appsec.io
  ## @param webhook.path HTTP path served by the webhook
  path: /mutate
  ## @param webhook.debugLevel Webhook log level
  debugLevel: Warning
  ## @param webhook.failurePolicy Failure policy for the MutatingWebhookConfiguration
  failurePolicy: Fail
  ## @param webhook.matchPolicy Match policy for the MutatingWebhookConfiguration
  matchPolicy: Equivalent
  ## @param webhook.sideEffects Side effects declaration for the webhook
  sideEffects: None
  ## @param webhook.timeoutSeconds Timeout in seconds for the webhook callout
  timeoutSeconds: 5
  ## @param webhook.istiodPort Istiod XDS port
  istiodPort: 15014
  ## @param webhook.scope Scope of objects the webhook matches (Namespaced, Cluster, *)
  scope: Namespaced
  ## @param webhook.istioIngressGatewayAttachmentLibrary Filesystem path of the Istio ingress-gateway attachment library inside the proxy container
  istioIngressGatewayAttachmentLibrary: /usr/lib/attachment
  ## @param webhook.istioIngressGatewayImageName Container image name to match when injecting into Istio ingress-gateway pods
  istioIngressGatewayImageName: istio-proxy
  ## @param webhook.concurrencyCalculation Method used to derive worker concurrency
  concurrencyCalculation: istioCpuLimit
  ## @param webhook.concurrencyNumber Static worker concurrency (used when concurrencyCalculation is fixed)
  concurrencyNumber: 1
  ## @param webhook.configPort Port the agent exposes for runtime config
  configPort: 15000
  ## @param webhook.deployAttachment Deploy the attachment workload
  deployAttachment: true

  ## @param webhook.caBundle PEM CA bundle used by the webhook clients
  caBundle: ""

  ## @param webhook.removeInjectedData Remove previously-injected data when an injected pod restarts
  removeInjectedData: false

  ## @param webhook.replicaCount Number of open-appsec webhook nodes
  ##
  replicaCount: 1

  ## PodDisruptionBudget for the webhook. The webhook has `failurePolicy: Fail`,
  ## so losing it during a node drain stops admission cluster-wide until it
  ## comes back. A PDB blocks voluntary disruptions when fewer than the
  ## configured number of replicas would remain available.
  ##
  ## NOTE: A PDB only protects against VOLUNTARY disruptions (kubectl drain,
  ## node-pool upgrades, cluster autoscaler). It cannot prevent involuntary
  ## ones (kernel panic, network partition, OOM). For real availability,
  ## pair `pdb.enabled: true` with `replicaCount: 2+` and pod anti-affinity.
  ##
  pdb:
    ## @param webhook.pdb.enabled Render a PodDisruptionBudget for the webhook. Recommended in production with `replicaCount >= 2`.
    ##
    enabled: false
    ## @param webhook.pdb.minAvailable Minimum number/percentage of webhook pods that must remain available during a voluntary disruption. Leave empty to use `maxUnavailable` instead. Cannot be set alongside `maxUnavailable`.
    ##
    minAvailable: ""
    ## @param webhook.pdb.maxUnavailable Maximum number/percentage of webhook pods that may be unavailable during a voluntary disruption. Defaults to `1` when both this and `minAvailable` are empty.
    ##
    maxUnavailable: ""

  ## Pre-delete cleanup for runtime-created EnvoyFilters.
  ##
  ## The webhook's mutating logic creates an EnvoyFilter (label `owner: waf`)
  ## in each Istio gateway namespace it injects the agent into. Those
  ## resources are NOT owned by any Helm release, so `helm uninstall` leaves
  ## them orphaned in the cluster — Envoy still loads the (now-missing)
  ## attachment library and the proxy may crash on next config refresh.
  ##
  ## Enable this to render a `pre-delete` Helm hook Job that deletes the
  ## orphans via `kubectl` before the chart's own resources tear down. The
  ## Job reuses the webhook ServiceAccount (already bound to a ClusterRole
  ## that grants `delete` on `networking.istio.io/envoyfilters` cluster-wide)
  ## so no additional RBAC is needed.
  ##
  ## CAVEAT: the default selector `owner=waf` is what the runtime binary
  ## stamps onto EnvoyFilters; it does NOT carry a release-name suffix.
  ## If multiple open-appsec-injector releases share a cluster, uninstalling
  ## any one of them will delete EnvoyFilters belonging to ALL of them.
  ## Single-release clusters are fine.
  ##
  uninstallCleanup:
    ## @param webhook.uninstallCleanup.enabled Render a pre-delete Helm hook Job that deletes runtime-created EnvoyFilters via kubectl. Default `false` for backwards compatibility — flip on for orphan-free uninstalls.
    ##
    enabled: false
    ## @param webhook.uninstallCleanup.selector Label selector passed to `kubectl delete envoyfilter -A`. Defaults to the label the open-appsec runtime stamps onto EnvoyFilters it creates (`owner=waf`). Override if your runtime version uses a different label scheme.
    ##
    selector: "owner=waf"
    image:
      ## @param webhook.uninstallCleanup.image.registry kubectl image registry for the cleanup Job container
      ##
      registry: docker.io
      ## @param webhook.uninstallCleanup.image.repository kubectl image repository
      ##
      repository: bitnami/kubectl
      ## @param webhook.uninstallCleanup.image.tag kubectl image tag (recommended: pin a specific version rather than `latest` in production)
      ##
      tag: latest
      ## @param webhook.uninstallCleanup.image.pullPolicy kubectl image pull policy
      ##
      pullPolicy: IfNotPresent
      ## @param webhook.uninstallCleanup.image.pullSecrets [array] kubectl image pull secrets
      ##
      pullSecrets: []

  ## @param webhook.revisionHistoryLimit
  ##
  revisionHistoryLimit: 1
  ## @param webhook.updateStrategy.type Set up update strategy for open-appsec webhook installation.
  ## Set to Recreate if you use persistent volume that cannot be mounted by more than one pods to make sure the pods is destroyed first.
