    ## @param webhook.containerPorts.https Container https port
    https: 443
    ## @param webhook.containerPorts.metrics Container metrics port
    metrics: 7465
  ## @param webhook.extraPorts [array] Extra ports for container deployment
  ##
  extraPorts: []
  ## Node affinity preset
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ## @param webhook.nodeAffinityPreset.type Node affinity preset type. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
  ## @param webhook.nodeAffinityPreset.key Node label key to match Ignored if `affinity` is set.
  ## @param webhook.nodeAffinityPreset.values [array] Node label values to match. Ignored if `affinity` is set.
