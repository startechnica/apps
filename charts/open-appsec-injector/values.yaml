    tlsConfig:
      insecureSkipVerify: false
      serverName: ""
      caFile: ""
      certFile: ""
      keyFile: ""
      caSecretName: ""
      certSecretName: ""
      certSecretCertKey: "tls.crt"
      certSecretKeyKey: "tls.key"
  ## Prometheus Operator PrometheusRule configuration
  ##
  prometheusRule:
    ## @param metrics.prometheusRule.enabled if `true`, creates a Prometheus Operator PrometheusRule (also requires `metrics.enabled` to be `true` and `metrics.prometheusRule.rules`)
    ##
    enabled: false
    ## @param metrics.prometheusRule.namespace Namespace for the PrometheusRule Resource (defaults to the Release Namespace)
    ##
    namespace: ""
    ## @param metrics.prometheusRule.labels [object] Additional labels that can be used so PrometheusRule will be discovered by Prometheus
    ##
    labels: {}
    ## @param metrics.prometheusRule.groups [array] Groups, containing the alert rules.
    ## Example:
    ##   groups:
    ##     - name: open-appsec webhook
    ##       rules:
    ##         - alert: GoInstanceNotAvailable
    ##           annotations:
    ##             message: "open-appsec webhook instance in namespace {{ `{{` }} $labels.namespace {{ `}}` }} has not been available for the last 5 minutes."
    ##           expr: |
    ##             absent(kube_pod_status_ready{namespace="{{ include "st-common.names.namespace" . }}", condition="true"} * on (pod) kube_pod_labels{pod=~"{{ include "st-common.names.fullname" . }}-\\d+", namespace="{{ include "st-common.names.namespace" . }}"}) != 0
    ##           for: 5m
    ##           labels:
    ##             severity: critical
    groups: []

## @section PostgreSQL subchart parameters

## When `appsec.tuning.enabled=true`, the tuning component needs a PostgreSQL
## backend. Pick exactly one of:
##   - bundled subchart: `postgresql.enabled: true` (this block governs config)
##   - external instance: leave `postgresql.enabled: false` AND set the
##     top-level `externalDatabase.host` block (plus optional `existingSecret`)
## Default `enabled: false` keeps minimal installs minimal — operators
## upgrading from 1.0.x with tuning on must explicitly flip `postgresql.enabled`
## to `true` (or migrate to external DB).
##
postgresql:
  ## @param postgresql.enabled Render the bundled Bitnami PostgreSQL subchart. Required when `appsec.tuning.enabled=true` AND the top-level `externalDatabase.host` is empty.
  ##
  enabled: false
  # -- docker image for built-in postgresql - overriding to use bitnamilegacy repository
  image:
    ## @param postgresql.image.registry Image registry
    registry: docker.io
    ## @param postgresql.image.repository Image repository
    repository: bitnamilegacy/postgresql
    # -- Using bitnamilegacy/postgresql for compatibility with older image versions.
    # You can switch back to bitnami/postgresql if needed.
