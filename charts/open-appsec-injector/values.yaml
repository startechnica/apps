    deploymentAnnotations: {}
    ## @param appsec.storage.podLabels [object] Extra labels for open-appsec appsec.storage pods
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
    ##
    podLabels: {}
    ## @param appsec.storage.podAnnotations [object] open-appsec appsec.storage Pod annotations
    ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
    ##
    podAnnotations: {}
