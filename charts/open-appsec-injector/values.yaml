    name: ""
    ## @param webhook.serviceAccount.automountServiceAccountToken Automount service account token for the open-appsec webhook service account
    ##
    automountServiceAccountToken: true
    ## @param webhook.serviceAccount.annotations [object] Annotations for service account. Evaluated as a template. Only used if `create` is `true`.
    ##
    annotations: {}

  ## Prometheus metrics
  ##
  metrics:
    ## Prometheus Operator ServiceMonitor configuration
    ## @param webhook.metrics.service.annotations [object] Annotations for Prometheus metrics service
    ##
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7465"
        prometheus.io/path: "/metrics"
    serviceMonitor:
      ## @param webhook.metrics.serviceMonitor.enabled if `true`, creates a Prometheus Operator ServiceMonitor (also requires `metrics.enabled` to be `true`)
      ##
      enabled: false
      ## @param webhook.metrics.serviceMonitor.port Metrics service HTTP port
      ##
      port: http-metrics
      ## @param webhook.metrics.serviceMonitor.endpoints [array] The endpoint configuration of the ServiceMonitor. Path is mandatory. Interval, timeout and labellings can be overwritten.
      ##
      endpoints:
        - path: /metrics
      ## @param webhook.metrics.serviceMonitor.path HTTP path scraped for metrics. Used only as a fallback when `endpoints` is empty (the template builds a single-endpoint list from this value).
      ##
      path: /metrics
      ## @param webhook.metrics.serviceMonitor.namespace Namespace in which Prometheus is running
      ##
      namespace: ""
      ## @param webhook.metrics.serviceMonitor.interval Interval at which metrics should be scraped.
      ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
      ## e.g:
      ## interval: 10s
      ##
      interval: ""
      ## @param webhook.metrics.serviceMonitor.scrapeTimeout Timeout after which the scrape is ended
      ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
      ## e.g:
      ## scrapeTimeout: 10s
      ##
      scrapeTimeout: ""
      ## @param webhook.metrics.serviceMonitor.selector [object] Prometheus instance selector labels
      ## ref: https://github.com/bitnami/charts/tree/main/bitnami/prometheus-operator#prometheus-configuration
      ## e.g:
      ## selector:
      ##   prometheus: my-prometheus
      ##
      selector: {}
      ## @param webhook.metrics.serviceMonitor.relabelings [array] RelabelConfigs to apply to samples before scraping
      ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#relabelconfig
      ##
      relabelings: []
      ## @param webhook.metrics.serviceMonitor.metricRelabelings [array] MetricRelabelConfigs to apply to samples before ingestion
      ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#relabelconfig
      ##
      metricRelabelings: []
      ## @param webhook.metrics.serviceMonitor.honorLabels Labels to honor to add to the scrape endpoint
      ##
      honorLabels: false
      ## @param webhook.metrics.serviceMonitor.labels [object] Additional custom labels for the ServiceMonitor
      ##
      labels: {}
      ## @param webhook.metrics.serviceMonitor.annotations [object] Additional annotations for the ServiceMonitor
      annotations: {}
      ## @param webhook.metrics.serviceMonitor.jobLabel The name of the label on the target service to use as the job name in prometheus.
      ##
      jobLabel: ""
      ## TLS configuration for Prometheus scraping
      ## @param webhook.metrics.serviceMonitor.tlsConfig [object] TLS configuration for the ServiceMonitor scrape
      tlsConfig: {}

