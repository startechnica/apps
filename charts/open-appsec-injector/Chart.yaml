annotations:
  category: WAF
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/startechnica/apps/tree/main/charts/open-appsec-injector
    - name: Upstream Project
      url: https://github.com/openappsec/openappsec
  artifacthub.io/changes: |
    - kind: changed
      description: "CRDs split into sister chart open-appsec-crd 1.0.0; bundled by default via crds.enabled=true. Set crds.enabled=false to manage CRDs separately. See Upgrading."
    - kind: added
      description: "Top-level allowedNamespaces to scope the openappsec.io ClusterRoleBinding subject set AND per-component NetworkPolicy ingress (default release namespace only)."
    - kind: added
      description: "tls.certManager scaffolding (Issuer/Certificate + MWC inject-ca-from) — dormant until upstream container exposes a cert-bootstrap toggle."
    - kind: changed
      description: "Webhook probe defaults port:http→https, scheme:HTTP→HTTPS to match the only declared containerPort."
    - kind: removed
      description: "logDestination.local-tuning from LogTrigger v1beta2 — rename overrides to logDestination.k8s-service before upgrade."
    - kind: removed
      description: "Dead webhook.{imagePullPolicy, integrationType, namePretty, namespace, rbac.*} values keys."
    - kind: fixed
      description: "policiesns.openappsec.io specificRules.items.required block (had drifted from policies twin); _pvc.tpl prefix bugs; schedulerName gate."
    - kind: changed
      description: "appVersion 1.1.32 -> 1.1.34; postgresql subchart 12.2.8 -> 18.6.6 (moved to OCI registry; Bitnami retired the legacy HTTP index); st-common 0.1.16 -> 0.1.20."
    - kind: added
      description: "appsec.tuning.externalDatabase.* to point tuning at an external PostgreSQL; postgresql.enabled flag (default false) decouples the subchart from appsec.tuning.enabled — see Upgrading."
apiVersion: v2
appVersion: 1.1.34
dependencies:
  - condition: crds.enabled
    name: open-appsec-crd
    repository: "file://../open-appsec-crd"
    version: 1.0.0
  - condition: postgresql.enabled
    name: postgresql
    repository: "oci://registry-1.docker.io/bitnamicharts"
    version: 18.6.6
  - name: st-common
    repository: https://startechnica.github.io/apps
    version: 0.1.20
description: A Helm chart for deploying open-appsec mutating webhook to inject a sidecar container.
icon: https://i2-s3-ui-static-content-prod-10.s3.eu-west-1.amazonaws.com/elpis/tree-no-bg-256.png
keywords:
  - waf
  - open-apssec
  - istio
  - kong
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: firmansyahn
    email: firmansyah@nainggolan.id
    url: https://firmansyah.nainggolan.id
name: open-appsec-injector
sources:
  - https://github.com/openappsec/openappsec
type: application
version: 1.1.0
