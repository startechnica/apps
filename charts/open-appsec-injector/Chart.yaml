annotations:
  category: WAF
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/startechnica/apps/tree/main/charts/open-appsec-injector
    - name: Upstream Project
      url: https://github.com/openappsec/openappsec
  artifacthub.io/changes: |
    - kind: added
      description: "Top-level externalDatabase.{host,port,user,existingSecret,existingSecretPasswordKey} for pointing tuning at a managed PostgreSQL."
    - kind: added
      description: "appsec.tuning.configs.bootstrap.existingConfigMap — optional BYO ConfigMap holding bootstrapConfig.yaml + tableSchema.json, mounted via subPath to override the tuning binary's baked-in config."
    - kind: added
      description: "webhook.uninstallCleanup — optional pre-delete hook that deletes runtime-created EnvoyFilters (label owner=waf) so they don't outlive `helm uninstall`."
apiVersion: v2
appVersion: 1.1.34
dependencies:
  - condition: crds.enabled
    name: open-appsec-crd
    repository: "file://../open-appsec-crd"
    version: 1.0.0
  - condition: postgresql.enabled
    name: postgresql
    repository: "oci://registry-1.docker.io/bitnamicharts"
    version: 18.6.6
  - name: st-common
    repository: https://startechnica.github.io/apps
    version: 0.1.20
description: A Helm chart for deploying open-appsec mutating webhook to inject a sidecar container.
icon: https://i2-s3-ui-static-content-prod-10.s3.eu-west-1.amazonaws.com/elpis/tree-no-bg-256.png
keywords:
  - waf
  - open-apssec
  - istio
  - kong
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: firmansyahn
    email: firmansyah@nainggolan.id
    url: https://firmansyah.nainggolan.id
name: open-appsec-injector
sources:
  - https://github.com/openappsec/openappsec
type: application
version: 1.1.1
