## Service parameters
##
service:
  ## @param service.type Kubernetes Service type
  ##
  type: ClusterIP
  ## @param service.clusterIP Gunicorn service Cluster IP
  ## e.g.:
  ## clusterIP: None
  ##
  clusterIP: ""
  ## @param service.ports.http Gunicorn HTTP service port
  ## @param service.ports.https Gunicorn HTTPS service port
  ##
  ports:
    rtsp: 8554
    rtmp: 1935
    hls: 8888
    webrtc: 8889
    webrtcUdp: 8890
    stun: 8189
  ## @param service.nodePorts.http Specify the nodePort value for the LoadBalancer and NodePort HTTP service types
  ## @param service.nodePorts.https Specify the nodePort value for the LoadBalancer and NodePort HTTPS service types
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
  ##
  nodePorts:
    rtsp: ""
    rtmp: ""
    hls: ""
    webrtc: ""
    webrtcUdp: ""
    stun: ""
  ## @param service.loadBalancerIP loadBalancerIP if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
  ##
  loadBalancerIP: ""
  ## @param service.loadBalancerClass loadBalancerClass if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
  ##
  loadBalancerClass: ""
  ## @param service.loadBalancerSourceRanges loadBalancerSourceRanges if Gunicorn service type is `LoadBalancer` (optional, cloud specific)
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
  ## e.g:
  ## loadBalancerSourceRanges:
  ##   - 10.10.10.0/24
  ##
  loadBalancerSourceRanges: []
  ## @param service.annotations Provide any additional annotations which may be required.
  ## This can be used to set the LoadBalancer service type to internal only.
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#internal-load-balancer
  ##
  annotations: {}
  ## @param service.externalTrafficPolicy Gunicorn service external traffic policy
  ## ref https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  ##
  externalTrafficPolicy: Cluster
  ## @param service.extraPorts Extra port to expose on Gunicorn service
  ##
  extraPorts: []
  ## @param service.sessionAffinity Session Affinity for Kubernetes service, can be "None" or "ClientIP"
  ## If "ClientIP", consecutive client requests will be directed to the same Pod
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
  ##
  sessionAffinity: None
  ## @param service.sessionAffinityConfig Additional settings for the sessionAffinity
  ## sessionAffinityConfig:
  ##   clientIP:
  ##     timeoutSeconds: 300
  ##
  sessionAffinityConfig: {}
## @section TLS configuration
## @param tls.enabled  Enable SSL/TLS encryption for Gunicorn server (HTTPS)
## @param tls.autoGenerated  Create self-signed TLS certificates. Currently only supports PEM certificates.
## @param tls.certificatesMountPath  Where Gunicorn certifcates are mounted.
## @param tls.certificatesSecretName  Name of the secret that contains the certificates
## @param tls.CAFilename  CA certificate filename. Should match with the CA entry key in the tls.certificatesSecretName.
## @param tls.certFilename  Client certificate filename to authenticate against the Gunicorn server. Should match with certificate the entry key in the tls.certificatesSecretName.
## @param tls.certKeyFilename  Client Key filename to authenticate against the Gunicorn server. Should match with certificate the entry key in the tls.certificatesSecretName.
## @param tls.existingSecret  Name of the existing secret containing Gunicorn server certificates
##
##
tls:
  enabled: false
  autoGenerated: false
  certificatesMountPath: /app/certs/
  certificatesSecretName: ""
  certFilename: ""
  certKeyFilename: ""
  certCAFilename: ""
  existingSecretName: ""
  ## @param tls.usePemCerts Use this variable if your secrets contain PEM certificates instead of PKCS12
  ## Note: Ignored when using autoGenerated certs.
  ##
  usePemCerts: false
  ## @param tls.keyPassword Password to access the PEM key when it is password-protected.
  ##
  keyPassword: ""
  ## @param tls.keystorePassword Password to access the PKCS12 keystore when it is password-protected.
