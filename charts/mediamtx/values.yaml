## @param extraEnvVarsCM List of existing ConfigMap containing extra env vars for MediaMTX nodes
##
extraEnvVarsCMs: []
## @param extraEnvVarsSecrets List of secrets with extra environment variables for MediaMTX pods
##
extraEnvVarsSecrets: []
## @param extraEnvVars Array containing extra env vars to configure MediaMTX
## For example:
## extraEnvVars:
##  - name: GF_DEFAULT_INSTANCE_NAME
##    value: my-instance
##
extraEnvVars: []
## @param extraConfigmaps Array to mount extra ConfigMaps to configure MediaMTX
## For example:
