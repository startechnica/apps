## MediaMTX image version
## ref: 
## @param image.registry [default: REGISTRY_NAME] MediaMTX image registry
## @param image.repository [default: REPOSITORY_NAME/cep-web-admin-console] MediaMTX image repository
## @skip image.tag MediaMTX image tag (immutable tags are recommended)
## @param image.digest MediaMTX image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
## @param image.pullPolicy MediaMTX image pull policy
## @param image.pullSecrets MediaMTX image pull secrets
##
image:
  registry: docker.io
  repository: bluenviron/mediamtx
  tag: 1.17.1
  digest: ""
  debug: false
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ##
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  pullSecrets: []
## @param existingSecretName  Provide passwords using existing secret
## If set, this Secret must contain the following keys:
## - db-password: database password (if postgresql.enabled is false and
##     externalDatabase.existingSecretName is blank)
## - email-password: SMTP user password
## - secret-key: session encryption token (50+ random characters)
## - superuser-password: Password for the initial super-user account
## - superuser-api-token: API token created for the initial super-user account
##
existingSecretName: ""
## @param extraConfig  Extra configuration settings
## You can pass additional YAML files to be loaded into MediaMTX's configuration.
## These can be passed as arbitrary configuration values set in the chart, or
## you can load arbitrary *.yaml keys from ConfigMaps and Secrets.
## extraConfig:
##   - values:
##       EXTRA_SETTING_ONE: example
##       ANOTHER_SETTING: foobar
##   - configMap: # pod.spec.volumes.configMap
##       name: mediamtx-extra
##       items: []
##       optional: false
##   - secret: # same as pod.spec.volumes.secret
##       secretName: mediamtx-extra
##       items: []
##       optional: false
##
extraConfig: []
## @section MediaMTX Core Settings
##
## Here’s a list of settings available in MediaMTX core and their default values. Settings provided by
## contrib apps are listed below, followed by a topical index of the core settings. For introductory
## material, see the settings topic guide.
## ref: https://docs.goproject.com/en/stable/ref/settings/#std
##


## @param configs.enabled  Enable loading environment variables from a ConfigMap containing a .env file.
## @param configs.extraConfigs  Additional key-value entries to include in the generated config ConfigMap.
## @param configs.existingConfigMapName  Use an existing ConfigMap instead of creating a new config ConfigMap.
## @param configs.volumeMounts.name  Name of the volume used to mount the .env file.
## @param configs.volumeMounts.path  Target file path where the .env file will be mounted inside the container.
## @param configs.volumeMounts.subPath  Sub-path of the .env file inside the ConfigMap volume.
##
configs:
  enabled: true
  extraConfigs: ""
  existingConfigMapName: ""
  volumeMounts:
    name: mediamtx
    path: /mediamtx.yml
    subPath: mediamtx.yml
## @param envvarsConfigMap.enabled  Enable injecting environment variables from a ConfigMap (key-value pairs).
## @param envvarsConfigMap.extraConfigs  Additional key-value entries to include in the envvars ConfigMap.
## @param envvarsConfigMap.existingConfigMapName  Use an existing ConfigMap instead of creating a new envvars ConfigMap.
##
envvarsConfigMap:
  enabled: false
  extraConfigs: ""
  existingConfigMapName: ""
## @param envvarsSecret.enabled  Enable injecting environment variables from a Kubernetes Secret.
## @param envvarsSecret.extraSecrets  Additional secret key-value pairs to include in the generated Secret.
## @param envvarsSecret.existingSecretName  Use an existing Secret instead of creating a new envvars Secret.
##
envvarsSecret:
  enabled: false
  extraSecrets: ""
  existingSecretName: ""
## @param logging.enabled  Enable or disable application logging configuration.
## @param logging.label  Custom label applied to log entries or log directory (implementation-specific).
## @param logging.level  Log level for the application.
##     Options: trace, debug, info, warn, error, fatal, panic.
## @param logging.volumeMounts.name  Name of the volume used to mount the logs directory.
## @param logging.volumeMounts.path  Directory path where logs will be stored inside the container.
## @param logging.volumeMounts.subPath  Sub-path inside the log volume to mount.
##
logging:
  enabled: true
  label: ""
  ## @param logging.level  
  ## Options: trace | debug | info | warn | error | fatal | panic
  ##
  level: debug
  volumeMounts:
    name: logs-dir
    path: /app/logs
    subPath: ""

